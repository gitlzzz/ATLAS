name: Build and Deploy Documentation

# Run on pushes to master, any tag starting with 'v', and on manual dispatch
on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*' # Matches tags like v1.0, v2.3.4, etc.
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for all branches and tags
          fetch-tags: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip" # Caches pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install sphinx sphinx_autodoc_typehints sphinx_rtd_theme myst_parser sphinx-multiversion
          pip install . # Assumes your package is installable from the root

      - name: Cache Sphinx build files
        uses: actions/cache@v4
        with:
          path: _build/html
          key: ${{ runner.os }}-sphinx-${{ hashFiles('docs/**/*', 'src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-sphinx-

      - name: Generate API documentation
        run: |
          sphinx-apidoc -o ./docs/source ./src/MatDBForge/ "*benchmarks*" "*display_db*" --remove-old -f

      - name: Build documentation with Sphinx
        run: |
          sphinx-multiversion docs _build/html

      - name: Create index.html redirect
        run: |
          echo '<!DOCTYPE html>
          <html>
          <head>
            <title>Redirecting to master branch</title>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./master/index.html">
            <link rel="canonical" href="https://pol-sb.github.io/MatDBForge/master/index.html">
          </head>
          </html>' > _build/html/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        # Deploy only on a push to the master branch or a tag push
        if: ${{ github.event_name == 'push' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/html/
          keep_files: true # IMPORTANT: This preserves existing documentation versions
