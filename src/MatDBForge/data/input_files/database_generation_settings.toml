# Template file generated by MatDBForge.
# Please, fill in the values for the parameters below.

############################################
# General database description, export and
# display options
############################################

[database]
# (str) Name of the database to be used as filename and for internal reference
database_name = "input_name_here"

# (int) minimum number of atoms in the structure
min_num_atoms = 64

# (int) maximum number of atoms in the structure
max_num_atoms = 128

# (float) minimum cell size in Angstrom
min_cell_size = 5.0

# (optional, str) Path to a folder containing DFT optimized structures
relax_struct_path = ""

# (str) Path for the final database
database_path = ""

# (optional, int) Value for the RNG seed
# rng_seed = 420

# (optional, bool) Allow database overwrite. Default is false.                                                                                                          ─╯
# If false, and the database exists, the new database name and
# folder will include a timestamp.
# overwrite_db = false


# Settings for the composition of the database
[database.composition]

# (int) Maximum number of structures to generate for the database
size = 7500

[database.composition.ratios]
# The sum of the fractions must be equal to 1.0

# (float) Fraction of structures that will be bulk
bulk = 0.4
# (float) Fraction of structures that will be surfaces
surface = 0.6
# (float) Fraction of structures that will be clusters
# cluster = 0.1


[database.plot_db]
# (bool) Display database with phase diagram after creation
show = true

# (str, optional) Format for the figure, such as 'png' or 'svg'.
# Default is 'png'.
format = 'png'

# Display options which follow the RCParams of matplotlib
rc_params."font.family" = "monospace"
rc_params."font.size" = 14


[database.show_db_ase]
# (bool) Display database with ASE GUI after creation
show = true


[database.export]
# (str) Export format for the database, such as 'extxyz'.
# The format must be supported by ASE, see:
# https://wiki.fysik.dtu.dk/ase/ase/io/io.html#ase.io.read
export = true
format = 'extxyz'
file_path = ""
file_name = "export_db_filename"


############################################
# Description of the phase diagram
############################################

[phase_diagram]

# (str) Internal name for the phase diagram.
material_name = "default_material_name"

# (list[str]) List of elements in the phase diagram
element_list = ["Cu", "O"]

# (str) Symbol of the most abundant element in the phase
# It must be one of the elements in the `element_list`
base_element = "Cu"

##### Phases definition #####
# The `phase` key in `phase_diagram` will contain information
# for a phase. Several phases can be defined as new sub-keys in the `phase` key,
# like shown below for the phase `ADD_PHASE_NAME_HERE`.
# The name of the subkey can have any format and will be used only internally.
[phase_diagram.phase.ADD_PHASE_NAME_HERE]

# (str) Name to be used as reference for the phase
# e.g. 'alpha', 'beta', 'gamma', 'liquid', 'amorphous'
name = "default_phase_name"

# (str, optional) Symbol of the element to be used as template for
# defining the cluster positions.
# If not defined, the base element will be used.
cluster_element = "Cu"

# (dict[float]) Dictionary containing the composition fractions of each element in
# the current phase as a float.
# Each element will have a key with the symbol of the element, 
# and this key will hold the min and max keys, e.g.:
#
#
# (float) Min composition (fractional) of element X in the current phase
# composition.X.min = 0.1
#
# (float) Max composition (fractional) of element X in the current phase
# composition.X.max = 0.2
#
# composition.Y.min = 0.1
# ...

composition.Cu.min = 0.1
composition.Cu.max = 0.2

composition.O.min = 0.1
composition.O.max = 0.2


# (str) Materials project ID of a prototypical structure
# e.g., 'mp-30' for Cu alpha.
prototype = "mp-XX"

# (float) Fraction of composition allowed to go over and under 
# the limits of the phase
offset = 0.1

# (bool) Whether to replace a series of elements with the base element
replacements.replace = true

# (list[str]) List of elements to replace with the base element
# The string "M" can be used to represent any metallic element.
replacements.element_list = ["Ti"]

# (optional, int) Maximum number of structures to generate for the phase
limit_max_num_structures = 100

# (optional, bool) Whether to allow applying modifications (supercells,
# replacements, perturbations, modifications...) to the base structure,
# or keep the base structure as the only structure for the phase.
# Default is true, allowing modifications to the base structure to be applied.
allow_modifications = true

# (optional, bool) Whether to save files in cache directory for repeated usage.
# Speeds up some parts of database generation. Can consume a lot of disk space.
use_cache = false

# To add additional phases, add a new entry to the `phase_diagram` key
#
# [phase_diagram.phase.XXXXX]
# name = "..."
# ...


############################################
# Settings related to structure generation
############################################

[generation]
# Type of structures to generate
# Options: 'bulk', 'surface', 'cluster'
generate_type = ['bulk', 'surface', 'cluster']


# Settings for the generation of bulk structures
[generation.bulk]

# (int) Number of structures to generate
num_struct = 25

# (int) Number of repeats for each structure
num_repeat = 5

# (int) Maximum supercell index for the bulk supercells
supercell_max_idx = 2


# Settings related to surface generation
[generation.surface]

# (int) Lowest miller index used to generate structures
min_miller_index = 1

# (int) Highest index for the supercell generation
# Supercells will be created in the x and y directions
max_miller_index = 3

# (float) Minimum slab size in Angstrom
min_slab_size_ang = 7

# [!] This parameter is still under development
# num_diff_layer_size =

# (float) Minimum vacuum size in Angstrom
min_vacuum_size_ang = 12

# (bool) Whether to generate supercells
get_supercells = true

# [!] This parameter is still under development
# (int) Number of fixed layers in the slab
fixed_layers = 3

# (int) Max number of surfaces to generate
max_number_supercells = 200

# (bool) Whether to save the structures in the current db
save_in_db = true

# (int) Number of replacement percentages to generate for each structure
num_replacements = 20

# (int) Number of repeats for each replacement
num_repeat_replace = 2

# (float) Fraction of slabs to save after generation.
# This avoids having too many slab structures with the same composition.
# frac_slabs_save = 0.1

# (float) Fraction of unreplaced supercells to save after generation.
# This avoids having too many slab structures with the same composition.
# frac_supercells_save = 0.1

# (int) Maximum number of slabs to gather from the slab generation.
# If a larger number of slabs is generated, a random subset of
# `max_slab_num` slabs will be selected.
max_slab_num = 15

# (int) Maximum number of workers to use for the ThreadPoolExecutor
n_workers = 12

# Settings related to cluster generation
# [generation.cluster]
# ...


############################################
# Settings related to the lattice 
# deformation
############################################

# The lattice deformation chooses a random deformation value
# between min and max.
[deformation]

# (float) Value as a percentage of the lattice side length
# that will be used as the maximum deformation.
lattice_frac_deform_max = 0.05

# (float) Value as a percentage of the lattice side length
# that will be used as the minimum deformation.
lattice_frac_deform_min = 0.01

# (int) Number of repeats for each structure.
# Each repeat will get different random deformations.
num_repeats = 5

# (int) Maximum number of lattice deformations to generate.
limit_max_num_deformations = 100


############################################
# Settings related to perturbation
############################################

[perturbation]

# Only apply the perturbation to the following types of structures
# valid types: 'bulk', 'surface', 'cluster'
filter_struct_types = ['bulk', 'surface']

# (int) Maximum number of perturbations to generate
limit_max_num_perturbs = 100

# (int) Number of repeats for each structure.
# Each repeat will get different random perturbations.
num_repeats = 7


############################################
# Settings related to adsorbate addition
############################################

[adsorbates]

# Only apply the perturbation to the following types of structures
# valid types: 'bulk', 'surface', 'cluster'
filter_struct_types = ['surface']

# (int) Maximum number of perturbations to generate
limit_max_num_perturbs = 1700

# (int) Number of repeats for each structure.
# Each repeat will get different random perturbations.
num_repeats = 7

# (list[str]) List of adsorbate species to consider
adsorbate_species = ["H", "H2O"]


###############################################
# Settings related to wrong structure cleanup
###############################################

[struct_filters]

# Specific settings for the no neighbor check filter.
# WARNING: only use when dealing with bulks, surfaces or clusters
# that have no adsorbed molecules. Disable this filter if not needed.
[struct_filters.no_neighbors]

# (float) Multiplier applied to the covalent radii to be used as cutoff
# radius for the neighbor check. Default is 1.0
cov_rad_multiplier = 1.05


# Specific settings for the layer distance MD filter.
[struct_filters.layer_distance]

# (float) Maximum accepted distance between layers (in Angstrom).
max_layer_distance_ang = 3.5


[struct_filters.duplicate_slabs]

# (float) Tolerance for the duplicate slabs filter
tolerance = 0.2

############################################
# Settings related to vacancy generation
############################################

# Apply vacancies to a random subset of structures.
# The sites to be removed will be selected randomly,
# according to an user-specified maxium number of vacancies.
[vacancies]

# Only apply the perturbation to the following types of structures
# valid types: 'bulk', 'surface', 'cluster'.
filter_struct_types = ['bulk', 'surface']

# (int) Maximum number of structures with vacancies to generate.
limit_max_num_vacancies = 200

# (int) Number of repeats for each structure.
# Each repeat will get different random vacancies.
num_repeats = 3

# (float) Max vacancies to generate as a percentage of the total number of atoms
# The actual number will be selected randomly between the min and max values.
max_vacancy_percentage = 0.075

# (float) Min vacancies to generate as a percentage of the total number of atoms
# The actual number will be selected randomly between the min and max values.
min_vacancy_percentage = 0.025

# (list[str]) List of elements to consider for the vacancies
element_list = ["O"]


############################################
# Settings related to targeted generation
############################################

# Specific types of modifications to apply to the structures.
[targeted_modification]


# Apply a perturbation to the coordinates of the
# central atom in rutile-like structures.
# Repeats will apply different perturbations to the central atom.
# The other atoms will be kept fixed.
[targeted_modification.central_atom_octahedral]

# list(str) Only apply the modification to the following phases
filter_phases = ['rutile-sno2', 'rutile-nbo2', 'rutile-tao2']

# list(str) Only apply the modification to the following structure types.
# valid types: 'bulk', 'surface', 'cluster'.
filter_struct_types = ['bulk', 'surface']

# (str) Symbol of the central element of the octahedral site.
central_element = "Ir"

# (int) Number of repeats for each structure.
# Each repeat will get a different perturbation.
num_repeats = 3

# (int) Maximum number of modified structures to generate.
limit_max_num_modifications = 200

# (float) Max perturnbation movement of the central atom in Angstrom
max_perturbation_ang = 0.2


############################################
# Descriptors and concave hull generation
############################################

[concave_hull]

# (bool, optional) Whether to generate the concave hull of the descriptors
# for all the structures in the database.
# false by default, which means the concave hull will not be generated.
gen_concave_hull = false


# (str, optional) Descriptor to use for the concave hull generation
# Either one of the following: 'SOAP', 'MACE'.
# Default is 'SOAP'.
descriptor = "SOAP"


# (str, optional) Dimensionality reduction method to use for the concave hull
# generation. Either one of the following: 'PCA', 'autoencoder'.
# Default is 'autoencoder'.
dim_reduction = "autoencoder"


# (str, optional) Filename for the figure displaying the concave hull.
plot_filename = "descriptors_concave_hull.png"
