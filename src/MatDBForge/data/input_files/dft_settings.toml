# INCAR settings for different structure types
# Check the VASP manual for the meaning of the different tags
[incar.bulk]

SYSTEM = "Bulk structure"
istart = 0
icharg = 2
gga = "Pe"
ispin = 1
encut = 450               # Electronic steps


[incar.surface]

SYSTEM = "Surface structure"
# PREC = "Accurate"            # Precision setting

[incar.cluster]

SYSTEM = "Cluster structure"
