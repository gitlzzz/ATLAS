###############################################

# MACE training code and scheduler settings (aiida)
[mace_train]

# Weight of the force when considering model performance used in:
# weighted_sum = RMSE_E + (force_weight * RMSE_F)
# The lowest weighted_sum will be considered as the most performant model.
result_force_weight = 0.1

# AiiDA code name
code = "mace_run_train_gpu@tekla2-new-test"

# AiiDA scheduler options for MACE Training
metadata.options.resources.parallel_env = "c128m1024ib_mpi_32slots"
metadata.options.resources.tot_num_mpiprocs = 32
metadata.options.parser_name = "mace-training-parser"
metadata.options.queue_name = "c128m1024ibgpu4.q"
metadata.options.max_wallclock_seconds = 117280000
metadata.options.max_memory_kb = 102400000
metadata.options.withmpi = true
metadata.options.custom_scheduler_commands = '''#$ -l gpu=1
#$ -l hostname="tekla2188"'''

# MACE Training Settings (run_mace_train)
[mace_train.train_settings]
name = "nnp_training_test"
energy_key = "energy"
valid_fraction = 0.1
config_type_weights = { Default = 1.0 }
weight_decay = 9.34e-07
E0s = "average"
num_interactions = 2
model = "MACE"
correlation = 3
hidden_irreps = "16x0e + 16x1o"
lr = 0.005626773506534471
r_max = 6.0
max_ell = 3
max_L = 2
batch_size = 64
max_num_epochs = 35
swa = true
ema = true
ema_decay = 0.99
amsgrad = true
restart_latest = true
device = "cuda"
default_dtype = "float32"
wandb = false

###############################################

# DFT Settings
[dft]

# (str, optional) Selection of DFT calculator.
dft_method = "mace" # Options: "vasp", "mace". Default 'mace'.

# (int, optional) Maximum number of DFT calculations to perform per AL step.
# dft_calc_limit = 100


# MACE Settings as DFT calculator. Ignored if dft_method = "vasp" 
[dft.mace]
mace_potential_path = "" # Path to MACE potential file

# Options for MACE. Will be passed as arguments during MACE execution.
[dft.mace.settings]
device = "cuda"           # Options: "cpu", "cuda"
default_dtype = "float32" # Options: "float32", "float64"
batch_size = 64
compute_stress = true     # Options: true, false

# Scheduler options. Will be used in the builder.metadata.options.
[dft.mace.options]
parser_name = "mace-eval-parser"
code_string = "mace_run_eval_gpu@tekla2-new-test"
resources = { parallel_env = "c128m1024ib_mpi_32slots", tot_num_mpiprocs = 32 }
max_wallclock_seconds = 117280000
max_memory_kb = 102400000
custom_scheduler_commands = '''#$ -l gpu=1
#$ -l hostname="tekla2189"'''
withmpi = false

# Threshold filter options for MACE as DFT calculator.
# This will be run after the MACE calculation, before adding the results to the database.
# The filter will check the energy and forces of the MACE calculation
# against the DFT calculation. If the difference is larger than the threshold,
# the structure will be filtered out.
[dft.mace.filters]

# (bool) Whether to enable the threshold-based filtering.
filter_dft_calcs = false

# (float) Threshold in meV for the energy difference between the MACE and DFT energies.
# If the difference is larger than this value, the structure will be filtered out.
threshold_E_meV = 1000

# (float) Threshold in meV for the force difference between the MACE and DFT forces.
# If the difference is larger than this value, the structure will be filtered out.
threshold_F_meV = 10000

# Settings for VASP as DFT calculator. Ignored if dft_method = "mace" 
[dft.vasp]
# potential_family = "vasp-5.3-PBE"
potential_family = "vasp-5.4-PBE-2023"
structure_types = ['bulk', 'surface', 'cluster']

[dft.vasp.queue]
type = "sge"
node_cpus = 12
code_string = "vasp-std-5.4.4-new@tekla2"
options_resources = { parallel_env = "c12m48ib_mpi", tot_num_mpiprocs = 12 }
