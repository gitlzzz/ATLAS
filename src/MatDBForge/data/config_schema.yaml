      type: float
      mandatory: false
      default: 0.1
    code:
      description: "AiiDA code name for MACE training."
      type: str
      mandatory: true
      example: "mace_train@cluster"
    computer:
      description: "AiiDA computer name for MACE training."
      type: str
      mandatory: true
      example: "my_cluster"
    ignore_container:
      description: "Whether to ignore container settings for MACE training."
      type: bool
      mandatory: false
      default: false
    multihead_finetuning:
      description: "Whether to use multihead finetuning."
      type: bool
      mandatory: false
      default: false
    metadata:
      description: "AiiDA metadata and scheduler options for MACE training."
      type: dict
      mandatory: false
    train_settings:
      description: "MACE training parameters and hyperparameters."
      type: dict
      mandatory: false
  committee_eval:
    description: "Settings for committee evaluation using multiple MACE models."
    committee_num_models:
      description: "Total number of MACE models in the committee."
      type: int
      mandatory: false
      default: 4
    openmp_threads:
      description: "Number of OpenMP threads for MACE CPU evaluation."
      type: int
      mandatory: false
      default: 24
    ignore_container:
      description: "Whether to ignore container settings for committee evaluation."
      type: bool
      mandatory: false
      default: false
    prepend_text:
      description: "Text to prepend to job scripts for committee evaluation."
      type: str
      mandatory: false
    mace:
      description: "Settings for MACE evaluator."
      device:
        description: "Device for MACE evaluation."
        type: str
        mandatory: false
        default: "cpu"
        choices: ["cpu", "cuda"]
      default_dtype:
        description: "Default data type for MACE evaluation."
        type: str
        mandatory: false
        default: "float32"
        choices: ["float32", "float64"]
      batch_size:
        description: "Batch size for MACE evaluation."
        type: int
        mandatory: false
