# This file is the single source of truth for all input configurations.
# It is used to programmatically generate template files, documentation,
# and to validate user-provided configuration files.

database_generation:
  description: "Settings for the MatDBForge initial database generation (mdb_gen_init_db)."
  database:
    description: "General settings and file paths for the database."
    database_name:
      description: "Name of the database to be used for internal reference and as the filename."
      type: str
      mandatory: true
      example: "my_material_db"
    min_num_atoms:
      description: "Minimum number of atoms allowed in the generated structures."
      type: int
      mandatory: true
      default: 64
    max_num_atoms:
      description: "Maximum number of atoms allowed in the generated structures."
      type: int
      mandatory: true
      default: 128
    min_cell_size:
      description: "Minimum cell size in Angstrom."
      type: float
      mandatory: true
      default: 5.0
    relax_struct_path:
      description: "Path to a folder containing DFT optimized structures."
      type: str
      mandatory: false
      default: ""
    database_path:
      description: "Path where the final database will be saved."
      type: str, PosixPath
      mandatory: true
      default: ""
    rng_seed:
      description: "Numerical value used to fix the RNG seed. If not specified, it will be chosen randomly each run."
      type: int
      mandatory: false
      example: 42
    overwrite_db:
      description: "Allow database overwrite. If false, and the database exists, the new database name will include a timestamp."
      type: bool
      mandatory: false
      default: false
    composition:
      description: "Settings for the composition of the database."
      mandatory: true
      size:
        description: "Maximum number of structures to generate for the database."
        type: int
        mandatory: true
        default: 7500
      ratios:
        description: "Fraction of different structure types. The sum of the fractions must be equal to 1.0."
        bulk:
          description: "Fraction of structures that will be bulk."
          type: float
          mandatory: true
          default: 0.4
        surface:
          description: "Fraction of structures that will be surfaces."
          type: float
          mandatory: true
          default: 0.6
        cluster:
          description: "Fraction of structures that will be clusters."
          type: float
          mandatory: false
          default: 0.0
    plot_db:
      description: "Display and Export Options for the phase diagram plot."
      show:
        description: "Whether to display the database with a phase diagram after creation."
        type: bool
        mandatory: false
        default: true
      format:
        description: "Format for the figure."
        type: str
        mandatory: false
        default: "png"
        choices: ["png", "svg"]
      rc_params:
        description: "Matplotlib rcParams for the plot."
        "font.family":
          description: "Font family for the phase diagram plot."
          type: str
          mandatory: true
          default: "monospace"
        "font.size":
          description: "Font size for the phase diagram plot."
          type: int
          mandatory: true
          default: 14
    show_db_ase:
      description: "ASE GUI display options."
      mandatory: false
      show:
        description: "Whether to display the database using ASE GUI after creation."
        type: bool
        mandatory: false
        default: false
    export:
      description: "Export options for the database."
      export:
        description: "Whether to export the database."
        type: bool
        mandatory: true
        default: true
      format:
        description: "Export format supported by ASE (e.g., 'extxyz')."
        type: str
        mandatory: true
        default: "extxyz"
      file_path:
        description: "Path where the exported file will be saved."
        type: str, PosixPath
        mandatory: true
        default: ""
      file_name:
        description: "Name of the exported file."
        type: str
        mandatory: true
        default: "export_db_filename"
  phase_diagram:
    description: "Description of the phase diagram."
    material_name:
      description: "Internal name for the material in the phase diagram."
      type: str
      mandatory: true
      default: "default_material_name"
    element_list:
      description: "List of elements to include in the phase diagram."
      type: list[str]
      mandatory: true
      example: ["Cu", "O"]
    base_element:
      description: "Symbol of the most abundant element in the phase."
      type: str
      mandatory: true
      example: "Cu"
    phase:
      name: "phase"
      name_pretty: "Phase Definition"
      description: "Defines a specific phase within the phase diagram. Multiple phases can be added."
      dynamic_keys: true
      schema_under_dynamic_keys:
        name:
          description: "Name to be used as reference for the phase."
          type: str
          mandatory: true
          example: "alpha"
        cluster_element:
          description: "Symbol of the element defining the cluster."
          type: str
          mandatory: false
        # base_element:
        #   description: "Symbol of the most abundant element in this specific phase (overrides global base_element)."
        #   type: str
        #   mandatory: false
        prototype:
          description: "Materials Project ID of the prototypical structure."
          type: str
          mandatory: true
          example: "mp-30"
        composition:
          description: "Composition range for each element in the current phase of the phase diagram."
          dynamic_keys: true
          flatten: true
          schema_under_dynamic_keys:
            min:
              description: "Minimum composition as a fraction of the current phase element."
              type: float
              mandatory: true
              example: 0.1
            max:
              description: "Maximum composition as a fraction of the current phase element."
              type: float
              mandatory: true
              example: 0.25
        offset:
          description: "Fraction of composition allowed over and under the phase limits."
          type: float
          mandatory: true
          default: 0.1
        replacements:
          description: "Element replacement settings."
          flatten: true
          schema:
            replace:
              description: "Whether to replace specific elements. Elements in element_list will be considered for replacement and replaced by a single element species."
              type: bool
              mandatory: false
              default: false
            element_list:
              description: "List of elements to be replaced."
              type: list[str]
              mandatory: false
              example: ["Ti"]
            replace_with:
              description: "Element to replace with."
              type: str
              mandatory: false
              example: "Ir"
        limit_max_num_structures:
          description: "Maximum number of structures to generate for this phase."
          type: int
          mandatory: false
          default: 100
        allow_modifications:
          description: "Allow modifications (supercells, replacements, etc.) to the base structure."
          type: bool
          mandatory: false
          default: true
        use_cache:
          description: "Store structures in cache to speed up generation. Can consume a lot of disk space."
          type: bool
          mandatory: false
          default: false
  generation:
    description: "Structure generation settings."
    generate_type:
      description: "Types of structures to generate."
      type: list[str]
      mandatory: true
      default: ["bulk", "surface", "cluster"]
      choices: ["bulk", "surface", "cluster"]
    bulk:
      description: "Bulk structure generation settings."
      num_struct:
        description: "Number of structures to generate."
        type: int
        mandatory: true
        default: 25
      num_repeat:
        description: "Number of repeats for each structure."
        type: int
        mandatory: true
        default: 5
      supercell_max_idx:
        description: "Maximum Miller index for the bulk supercells."
        type: int
        mandatory: true
        default: 2
    surface:
      description: "Surface structure generation settings."
      min_miller_index:
        description: "Minimum Miller index used to generate surface structures."
        type: int
        mandatory: true
        default: 1
      max_miller_index:
        description: "Maximum Miller index used to generate surface structures."
        type: int
        mandatory: true
        default: 3
      min_slab_size_ang:
        description: "Minimum slab thickness in Angstrom."
        type: float
        mandatory: false
        default: 7.0
      min_vacuum_size_ang:
        description: "Minimum size of the vacuum layer in Angstroms."
        type: float
        mandatory: true
        default: 12.0
      get_supercells:
        description: "Whether to generate supercells for surface structures."
        type: bool
        mandatory: true
        default: true
      fixed_layers:
        description: "Number of fixed layers in the surface slab."
        type: int
        mandatory: true
        default: 3
      max_number_supercells:
        description: "Maximum number of surface supercells to generate."
        type: int
        mandatory: true
        default: 200
      save_in_db:
        description: "Whether to save generated surfaces in the database."
        type: bool
        mandatory: true
        default: true
      num_replacements:
        description: "Number of replacement percentages to generate for each structure."
        type: int
        mandatory: true
        default: 20
      num_repeat_replace:
        description: "Number of repeats for each replacement."
        type: int
        mandatory: true
        default: 2
      frac_slabs_save:
        description: "Fraction of slabs to save after generation."
        type: float
        mandatory: false
        default: 0.1
      frac_supercells_save:
        description: "Fraction of unreplaced supercells to save after generation."
        type: float
        mandatory: false
        default: 0.1
      max_slab_num:
        description: "Maximum number of slabs to gather from the slab generation."
        type: int
        mandatory: true
        default: 15
      n_workers:
        description: "Maximum number of workers for parallel processing."
        type: int
        mandatory: false
  deformation:
    description: "Lattice deformation settings."
    mandatory: false
    # Support for deprecated section name
    deprecated_aliases: ["displacement"]
    lattice_frac_deform_max:
      description: "Maximum deformation value as a percentage of the lattice side length."
      type: float
      mandatory: true
      default: 0.05
      # Support for deprecated parameter names
      deprecated_aliases: ["lattice_frac_displ_max"]
    lattice_frac_deform_min:
      description: "Minimum deformation value as a percentage of the lattice side length."
      type: float
      mandatory: true
      default: 0.01
      deprecated_aliases: ["lattice_frac_displ_min"]
    num_repeats:
      description: "Number of repeats for each structure with random deformations."
      type: int
      mandatory: true
      default: 5
    limit_max_num_deformations:
      description: "Maximum number of lattice deformations to generate."
      type: int
      mandatory: true
      default: 100
      deprecated_aliases: ["limit_max_num_displacements"]
  perturbation:
    description: "Perturbation settings."
    mandatory: false
    filter_struct_types:
      description: "Types of structures to which the perturbation will be applied."
      type: list[str]
      mandatory: true
      default: ["bulk", "surface"]
      choices: ["bulk", "surface", "cluster"]
    limit_max_num_perturbs:
      description: "Maximum number of perturbations to generate."
      type: int
      mandatory: true
      default: 100
    num_repeats:
      description: "Number of repeats for each structure with random perturbations."
      type: int
      mandatory: true
      default: 1
    perturbation_ang:
      description: "Perturbation magnitude in Angstrom."
      type: float
      mandatory: false
      default: 0.04
  adsorbates:
    description: "Adsorbate placement settings."
    mandatory: false
    filter_struct_types:
      description: "Types of structures to which adsorbates will be added."
      type: list[str]
      mandatory: false
      default: ["surface"]
      choices: ["bulk", "surface", "cluster"]
    limit_max_num_perturbs:
      description: "Maximum number of structures with adsorbates to generate."
      type: int
      mandatory: false
      default: 100
    num_repeats:
      description: "Number of repeats for each structure."
      type: int
      mandatory: true
      default: 1
    adsorbate_species:
      description: "List of adsorbate species to consider."
      type: list[str]
      mandatory: true
      example: ["H", "H2O"]
  struct_filters:
    mandatory: false
    description: "Settings for filtering out incorrect structures."
    no_neighbors:
      description: "Filter for structures with atoms that have no neighbors."
      cov_rad_multiplier:
        description: "Multiplier applied to the covalent radii to be used as cutoff radius for the neighbor check."
        type: float
        mandatory: false
        default: 1.2
    layer_distance:
      description: "Filter for layer distances in surface slabs."
      mandatory: false
      max_layer_distance_ang:
        description: "Maximum accepted distance between layers in Angstrom."
        type: float
        mandatory: false
        default: 4.0
    duplicate_slabs:
      description: "Filter for duplicate slabs."
      mandatory: false
      tolerance:
        description: "Tolerance for the duplicate slabs filter."
        type: float
        mandatory: false
        default: 0.2
  vacancies:
    description: "Settings for vacancy generation."
    filter_struct_types:
      description: "Types of structures to which vacancies will be applied."
      type: list[str]
      mandatory: true
      default: ["bulk", "surface"]
      choices: ["bulk", "surface", "cluster"]
    limit_max_num_vacancies:
      description: "Maximum number of structures with vacancies to generate."
      type: int
      mandatory: false
      default: 400
    num_repeats:
      description: "Number of repeats for each structure with different random vacancies."
      type: int
      mandatory: true
      default: 3
    max_vacancy_percentage:
      description: "Maximum vacancies to generate as a percentage of the total number of atoms."
      type: float
      mandatory: true
      default: 0.75
    min_vacancy_percentage:
      description: "Minimum vacancies to generate as a percentage of the total number of atoms."
      type: float
      mandatory: true
      default: 0.025
    element_list:
      description: "List of elements to consider for the vacancies."
      type: list[str]
      mandatory: true
      example: ["O"]
  targeted_modification:
    description: "Settings for targeted structural modifications."
    mandatory: false
    central_atom_octahedral:
      mandatory: false
      description: "Apply perturbations to the central atom in octahedral sites."
      filter_phases:
        description: "Only apply the modification to the following phases."
        type: list[str]
        mandatory: false
        example: ["rutile", "original_IrO2"]
      filter_struct_types:
        description: "Types of structures to which the modification will be applied."
        type: list[str]
        mandatory: false
        default: ["bulk", "surface"]
        choices: ["bulk", "surface", "cluster"]
      central_element:
        description: "Symbol of the central element of the octahedral site."
        type: str
        mandatory: false
        example: "Ir"
      num_repeats:
        description: "Number of repeats for each structure with different perturbations."
        type: int
        mandatory: false
        default: 3
      limit_max_num_modifications:
        description: "Maximum number of modified structures to generate."
        type: int
        mandatory: false
        default: 200
      max_perturbation_ang:
        description: "Maximum perturbation movement of the central atom in Angstrom."
        type: float
        mandatory: false
        default: 0.2
  concave_hull:
    mandatory: false
    description: "Settings for descriptors and concave hull generation."
    gen_concave_hull:
      description: "Whether to generate the concave hull of the descriptors for all structures in the database."
      type: bool
      mandatory: false
      default: false
    descriptor:
      description: "Descriptor to use for the concave hull generation."
      type: str
      mandatory: false
      default: "SOAP"
      choices: ["SOAP", "MACE"]
    dim_reduction:
      description: "Dimensionality reduction method for the concave hull generation."
      type: str
      mandatory: false
      default: "autoencoder"
      choices: ["PCA", "autoencoder"]
    plot_filename:
      description: "Filename for the figure displaying the concave hull."
      type: str
      mandatory: false
      default: "descriptors_concave_hull.png"

dft:
  description: "Settings for DFT calculations (e.g., via AiiDA)."
  general:
    description: "General settings for the DFT script."
    log_path:
      description: "Path where the logs will be stored."
      type: str, PosixPath
      mandatory: true
      default: "/tmp/"
    result_file_path:
      description: "Path for the results file (extxyz format)."
      type: str, PosixPath
      mandatory: true
      default: "dft_calculation_results"
    source_db:
      description: "Path to the source database file (.extxyz or mdb .xz format)."
      type: str, PosixPath
      mandatory: false
    aiida_group_name:
      description: "Name of the AiiDA group for the calculations."
      type: str
      mandatory: true
      example: "my_dft_run"
    max_batch:
      description: "Maximum number of structures to process in one batch."
      type: int
      mandatory: true
      default: 100
    queue_check_interval_seconds:
      description: "Interval in seconds to check the queue for submitting new calculations."
      type: int
      mandatory: true
      default: 240
    start_on_struct_idx:
      description: "Number of structures to skip before starting the calculations."
      type: int
      mandatory: true
      default: 0
    dry_run:
      description: "If True, a dry-run is performed and no calculations are submitted."
      type: bool
      mandatory: false
      default: false
    selected_structure_type:
      description: "If specified, only structures of this type will be processed."
      type: str
      mandatory: false
      choices: ["bulk", "surface", "cluster"]
  calculation:
    description: "DFT calculation settings."
    calc_type:
      description: "Type of calculation."
      type: str
      mandatory: true
      default: "static"
      choices: ["static", "relaxation"]
    aiida_potential_family:
      description: "AiiDA potential family name."
      type: str
      mandatory: true
      example: "vasp-5.4-PBE-2023"
    potential_mapping:
      description: "Mapping of elements to specific potential labels."
      type: dict
      mandatory: false
      example: { "Si": "Si_GW" }
  kpoints:
    description: "K-point settings."
    kspacing:
      description: "K-spacing in Å⁻¹ for different phases or a single value for all structures. The k-spacing values will be applied on a per-phase basis, according to the keys added to the dictionary which must match phases in the database. The `MDB_DEFAULT` key can be used to set a default k-spacing value for all phases not explicitly listed."
      type: dict
      mandatory: true
      example: { "alpha": 0.125, "MDB_DEFAULT": 0.15 }
  queue:
    description: "Queue settings for HPC schedulers (e.g., SLURM)."
    code_string:
      description: "Name of the code as defined in AiiDA."
      type: str
      mandatory: true
      example: "vasp@my_cluster"
    account:
      description: "Account to be used for the calculations."
      type: str
      mandatory: false
    qos:
      description: "Quality of service parameter."
      type: str
      mandatory: false
    node_cpus:
      description: "Number of CPUs per node."
      type: int
      mandatory: false
    max_wallclock_seconds:
      description: "Maximum wallclock time in seconds."
      type: int
      mandatory: true
      default: 16200
    max_memory_kb:
      description: "Maximum memory per node in KB."
      type: int
      mandatory: false
    multiple:
      description: "Whether to use multiple nodes."
      type: int
      mandatory: false
    custom_scheduler_commands:
      description: "Custom scheduler commands."
      type: str
      mandatory: false
    options_resources:
      description: "Scheduler resource options."
      tot_num_mpiprocs:
        description: "Total number of MPI processes."
        type: int
        mandatory: true
        default: 24
      parallel_env:
        description: "Parallel environment to be used."
        type: str
        mandatory: true
        default: " "
  aiida_vasp:
    description: "Settings for the AiiDA-VASP plugin."
    mandatory: false
    parser_settings:
      description: "Parser settings for aiida-vasp."
      add_kpoints:
        description: "Whether to add k-points information to the parsed results."
        type: bool
        mandatory: false
        default: true
      critical_notifications:
        description: "Critical error and warning notifications to be treated as important."
        add_edddav_zhegv:
          description: "Add EDDDAV ZHEGV error notification."
          type: bool
          mandatory: false
          default: true
        add_eddrmm_zhegv:
          description: "Add EDDRMM ZHEGV error notification."
          type: bool
          mandatory: false
          default: true
        add_not_hermitian:
          description: "Add not hermitian error notification."
          type: bool
          mandatory: false
          default: true
        add_brmix:
          description: "Add BRMIX error notification."
          type: bool
          mandatory: false
          default: true
        add_bandocc:
          description: "Add band occupation error notification."
          type: bool
          mandatory: false
          default: false
    critical_notifications:
      description: "Errors and warnings to be treated as critical (general)."
      type: dict
      mandatory: false
  incar:
    description: "INCAR settings for different structure types."
    bulk:
      description: "INCAR settings for bulk structures."
      type: dict
      mandatory: false
    surface:
      description: "INCAR settings for surface structures."
      type: dict
      mandatory: false
    cluster:
      description: "INCAR settings for cluster structures."
      type: dict
      mandatory: false

active_learning:
  description: "Settings for the active learning loop."
  active_learning:
    name: "active_learning"
    name_pretty: "Active Learning"
    description: "General active learning settings."
    aiida_profile:
      description: "Name of the AiiDA profile to be used."
      type: str
      mandatory: true
    enable_ntfysh:
      description: "Enable notifications using ntfy.sh for the run."
      type: bool
      mandatory: false
      default: false
    run_name:
      description: "Internal name for the run."
      type: str
      mandatory: true
    init_db_path:
      description: "Path to the folder containing the initial database."
      type: str, PosixPath
      mandatory: true
    results_dir:
      description: "Path for final results. A folder named run_{uuid} will be created inside."
      type: str, PosixPath
      mandatory: true
    reset_seed_db:
      description: "Whether to reset the seed database when resuming a stopped AL loop."
      type: bool
      mandatory: false
      default: false
    log_path:
      description: "Path for the log file. Defaults to results_dir if not specified."
      type: str, PosixPath
      mandatory: false
    final_db_name:
      description: "Name for the final database (extxyz format)."
      type: str
      mandatory: true
      default: "final_data_test"
    max_iterations:
      description: "Maximum number of AL loop iterations."
      type: int
      mandatory: true
      default: 3
    load_init_models:
      description: "Load initial models from a list of AiiDA UUIDs/PKs. The format is `[UUID1/PK1, UUID2/PK2, ...]`."
      type: list[int]
      mandatory: false
      default: []
    load_descriptor_calc:
      description: "Load a single descriptor calculation from a AiiDA UUID/PK."
      type: str
      mandatory: false
      default: ""
    load_md_calcs:
      description: "Load MD calculations from a list of AiiDA UUIDs/PKs."
      type: list[int]
      mandatory: false
      default: []
    al_mode:
      description: "Active learning mode."
      type: str
      mandatory: false
      default: "data_acquisition"
      choices: ["md", "data_reduction", "data_acquisition"]
  stop_conditions:
    name: "stop_conditions"
    mandatory: false
    name_pretty: "Active Learning Stopping Conditions"
    description: "Settings for the stopping conditions of the active learning loop."
    energy_threshold_mev:
      description: "Energy error threshold in meV/atom for the stopping criterion of the active learning loop. If not specified, a default of 43.0 is used."
      type: float
      default: 43.0
    forces_threshold_mev_per_ang:
      description: "Forces error threshold in meV/Å for the stopping criterion of the active learning loop. If not specified, a default of 50.0 is used."
      type: float
      default: 50.0
    stopping_threshold_type:
      description: "This option allows to select which error metric to compare with a threshold for the stopping criterion of the active learning loop. If not specified, this is not inclduded in the stopping criterion."
      type: str
      choices: ["validation", "testing"]
      default: None
  test_db:
    name: "test_db"
    name_pretty: "Test Set Settings"
    description: "Settings for the test database used to evaluate model performance during active learning. The test database is defined at the start of the active learning run, and is kept constant throughout the entire process. It can either be generated at random from the initial database, or loaded from a file. The test set is only used for evaluation and is not included in the training data.\n\nThe test database evaluation is performed after training the committee of models of each active learning iteration, using the sampler model. The test set and the evaluation results are logged and saved in the base workchain and in each of the active learning loop steps as outputs.\n\nSince the test database can be a subset of the training database, which is removed in place, a backup of the database is created under the same path and name as the original database, using the prefix `_original` and suffix `.bak`."
    use_test_db:
      description: "Whether to use a constant test set during active learning."
      type: bool
      mandatory: false
      default: false
    ignore_container:
      description: "Whether to ignore container settings for MACE training."
      type: bool
      mandatory: false
      default: false
    test_db_path:
      description: "Path to the test set database file."
      type: str, PosixPath
      mandatory: false
    test_db_frac:
      description: "Fraction of the initial database to be used as test set if no test_db_path is provided."
      type: float
      mandatory: false
      default: 0.1
    metadata:
      name: "test_db_metadata"
      name_pretty: "AiiDA Metadata for Test Set Calculations"
      description: "AiiDA metadata options for the test set."
      mandatory: false
      computer:
        description: "Name of the AiiDA computer where the test set calculations were run."
        type: str
        mandatory: true
        depends_on:
          key: test_db.use_test_db
          value: true
      prepend_text:
        description: "Text to prepend to the AiiDA calculation label for the test set calculations."
        type: str
        mandatory: false
      options:
        name: "test_db_aiida_options"
        name_pretty: "AiiDA Options for Test Set Calculations"
        description: "AiiDA options dictionary for the test set calculations."
        mandatory: false
        queue_name:
          description: "(SGE) Queue name."
          type: str
          mandatory: false
        qos:
          description: "(SLURM) QoS name."
          type: str
          mandatory: false
        account:
          description: "(SLURM) Account name."
          type: str
          mandatory: false
        max_wallclock_seconds:
          description: "Maximum wallclock time in seconds."
          type: int
          mandatory: false
        max_memory_kb:
          description: "Maximum memory in KB."
          type: int
          mandatory: false
        withmpi:
          description: "Whether to run with MPI."
          type: bool
          mandatory: false
        custom_scheduler_commands:
          description: "Custom scheduler commands."
          type: str
          mandatory: false
        resources:
          description: "Resources dictionary."
          mandatory: false
          parallel_env:
            description: "Parallel environment."
            type: str
            mandatory: false
          tot_num_mpiprocs:
            description: "Total number of MPI processes."
            type: int
            mandatory: false
          num_cores_per_mpiproc:
            description: "Number of cores per MPI process."
            type: int
            mandatory: false
          num_machines:
            description: "Number of machines."
            type: int
            mandatory: false
    model_settings:
      name: "model_settings"
      name_pretty: "Model Settings for Test Set Evaluation"
      description: "Settings for the model used to evaluate the test set during active learning."
      model_type:
        description: "Type of model to be used for test set evaluation."
        type: str
        mandatory: false
        default: "mace"
        choices: ["mace"]
      default_dtype:
        description: "Default data type for the model."
        type: str
        mandatory: false
        default: "float32"
        choices: ["float32", "float64"]
      device:
        description: "Device to be used for the model."
        type: str
        mandatory: false
        default: "cpu"
        choices: ["cpu", "cuda"]
  data_reduction:
    name: "data_reduction"
    name_pretty: "Data Reduction Settings"
    depends_on:
      key: active_learning.al_mode
      value: "data_reduction"
    description: "Settings for the data reduction AL mode."
    large_database_path:
      description: "Path to the large database file from which to select structures."
      type: str, PosixPath
      mandatory: true # Only if al_mode is data_reduction
    initial_selection_size:
      description: "Number of structures to select from the large database for initial training."
      type: int
      mandatory: true
      default: 100
    initial_selection_method:
      description: "Selection method for initial structures."
      type: str
      mandatory: true
      default: "lowest_energy"
      choices: ["random", "lowest_energy", "fps"]
    structures_per_iteration:
      description: "Number of structures to select per iteration from the large database."
      type: int
      mandatory: true
      default: 50
    iterative_selection_method:
      description: "Selection method for iterative structures."
      type: str
      mandatory: true
      default: "uncertainty"
      choices: ["random", "fps", "uncertainty", "lowest_energy"]
  al_seed:
    name: "al_seed"
    name_pretty: "Active Learning Seed Settings"
    description: "Settings for the AL seed generation for MD."
    seed_size_frac:
      description: "Sets total structures in an MD seed as a fraction of the training db size."
      type: float
      mandatory: true
      default: 0.1
    seed_min_num_structs:
      description: "Minimum number of structures in an MD seed."
      type: int
      mandatory: false
      default: 25
    seed_max_num_structs:
      description: "Maximum number of structures in the MD seed."
      type: int
      mandatory: true
      default: 500
    delete_seed_structs:
      description: "Whether to delete structures from the seed database even if they are in domain."
      type: bool
      mandatory: false
      default: true
    seed_select_settings:
      name: "seed_select_settings"
      name_pretty: "Seed Selection Settings"
      description: "MD seed selection mode settings."
      seed_select_type:
        description: "MD seed selection mode."
        type: str
        mandatory: true
        default: "random"
        choices: ["random", "small_first"]
      small_first_max_size:
        description: "Maximum size in number of atoms for structures selected with small_first mode."
        type: int
        mandatory: true
        default: 50
      small_first_max_iter:
        description: "Apply small_first mode for the first n iterations."
        type: int
        mandatory: true
        default: 5
    seed_ranking_settings:
      name: "seed_ranking_settings"
      name_pretty: "Seed Ranking Settings for Seed Selection"
      description: "Settings for the seed ranking methods."
      mandatory: false
      seed_ranking_algorithm:
        description: "Algorithm used for seed selection."
        type: str
        mandatory: false
        default: "random"
        choices: ["random", "descriptor_fps"]
      descriptor_fps:
        name: "descriptor_fps"
        name_pretty: "Farthest Point Sampling (FPS) Configuration"
        description: "Farthest Point Sampling (FPS) ranking."
        descriptor_type:
          description: "What descriptors to use for the seed selection process."
          type: str
          mandatory: false
          default: "soap"
          choices: ["soap", "mace"]
        initial_structure:
          description: "Whether to gather a structure at random or select the one with the lowest energy available."
          type: str
          mandatory: false
          default: "random"
          choices: ["random", "lowest_energy"]
        # TODO: Change descriptor into a dict for each descriptor type, i.e., descriptor_fps.soap, descriptor_fps.mace...
        descriptor:
          name: "descriptor"
          name_pretty: "FPS Seed Selection - Selected Descriptor Settings"
          description: "Entry containing settings that depend on the descriptor type selected."
          mandatory: false
          # For SOAP
          r_cut:
            description: "Cutoff radius for SOAP descriptor."
            type: float
            mandatory: false
            default: 6.0
            depends_on:
              key: al_seed.seed_ranking_settings.descriptor_fps.descriptor_type
              value: "soap"
          n_max:
            description: "Maximum number of radial basis functions for SOAP."
            type: int
            mandatory: false
            default: 8
            depends_on:
              key: al_seed.seed_ranking_settings.descriptor_fps.descriptor_type
              value: "soap"
          l_max:
            description: "Maximum degree of spherical harmonics for SOAP."
            type: int
            mandatory: false
            default: 6
            depends_on:
              key: al_seed.seed_ranking_settings.descriptor_fps.descriptor_type
              value: "soap"
          periodic:
            description: "Whether to consider the system as periodic."
            type: bool
            mandatory: false
            default: true
            depends_on:
              key: al_seed.seed_ranking_settings.descriptor_fps.descriptor_type
              value: "soap"
          average:
            description: "Averaging mode for SOAP descriptor."
            type: str
            mandatory: false
            default: "off"
            choices: ["inner", "outer", "off"]
          # For MACE
          model_path:
            description: "Path to the trained MACE model."
            type: str
            mandatory: false
            depends_on:
              key: al_seed.seed_ranking_settings.descriptor_fps.descriptor_type
              value: "mace"
          device:
            description: "What device to use for MACE."
            type: str
            mandatory: false
            default: "cpu"
            choices: ["cpu", "cuda"]
            depends_on:
              key: al_seed.seed_ranking_settings.descriptor_fps.descriptor_type
              value: "mace"
          dtype:
            description: "Floating point number precision for MACE."
            type: str
            mandatory: false
            default: "float32"
            choices: ["float32", "float64"]
            depends_on:
              key: al_seed.seed_ranking_settings.descriptor_fps.descriptor_type
              value: "mace"
          enable_cueq:
            description: "Enable CUEQ for MACE."
            type: bool
            mandatory: false
            default: false
            depends_on:
              key: al_seed.seed_ranking_settings.descriptor_fps.descriptor_type
              value: "mace"
  interpolation:
    name: "interpolation"
    name_pretty: "Interpolation Check Settings"
    description: "Settings for the interpolation check. The interpolation check determines whether a structure is within the model's knowledge domain by checking the committee models disagreement, considering the model accuracy threshold."
    mandatory: true
    model_acc_multiplier:
      description: "Multiplier for model accuracy threshold. Higher values mean more DFT calculations."
      type: float
      mandatory: true
      default: 10.0
    disagreement_check_type:
      description: "Approach for energy and force (E&F) committee disagreement check. With `training`, compare E&F with a threshold obtained from the training RMSE values multiplied by a threshold. With `md_threshold`, compare E&F with a threshold obtained from the standard deviaiton of the MD frames."
      type: str
      mandatory: true
      default: "training"
      choices: ["training", "md_threshold"]
    target_accuracy_e_meV_per_at:
      description: "Target accuracy for energy per atom in meV/atom. This should roughly correspond to the noise floor of your reference method, e.g., 1-2 meV/atom for DFT. By default, a relatively large value of 43 meV/atom is selected, since it correponds with a typical measure of chemical accuracy. However, this might be too high for some properties, such as long term diffusion or phase transitions."
      type: float
      mandatory: false
      default: 43.0
    target_accuracy_f_meV_per_A:
      description: "Target accuracy for force, in meV/Angstrom. This should roughly correspond to the noise floor of your reference method, e.g., 10-20 meV/atom for DFT. By default, a relatively large value of 50 meV/atom is selected, since it correponds with a typical measure of chemical accuracy."
      type: float
      mandatory: false
      default: 50.0
  extrapolation:
    name: "extrapolation"
    name_pretty: "Extrapolation Check Settings"
    description: "Settings for extrapolation checks."
    check_extrapolation_type:
      description: "Method for extrapolation check. With `min-max` or `basic`, check for extrapolation using the range of the MACE descriptors. With `alpha-shape` or `advanced`, check for extrapolation using the concave hull of the MACE descriptors. With `disabled` or `none`, disable the extrapolation check, only leaving committee disagreement for EF for the domain."
      type: str
      mandatory: false
      default: "none"
      choices: ["disabled", "none", "basic", "min-max", "alpha-shape", "advanced"]
    concave_hull:
      name: "concave_hull"
      name_pretty: "Concave Hull Extrapolation Check Settings"
      description: "Settings for the concave hull / alpha shape extrapolation check."
      mandatory: false
      target_alpha_range_min:
        type: float
        default: 1.0
        mandatory: false
        description: "Minimum alpha value for the concave hull."
      target_alpha_range_max:
        type: float
        default: 350.0
        mandatory: false
        description: "Maximum alpha value for the concave hull."
      default_alpha_if_issues:
        type: float
        default: 10.0
        mandatory: false
        description: "Default alpha value if there are issues with the concave hull generation."
      nn_dist_scale_factor:
        type: float
        default: 1.5
        mandatory: false
        description: "Scaling factor for the alpha candidate calculation, where `alpha_candidate = nn_dist_scale_factor / mean_nn_dist`"
      frac_points_allowed_out:
        type: float
        default: 0.002
        mandatory: false
        description: "Maximum fraction of points allowed to be outside the concave hull. If the fraction of points outside the hull exceeds this value, alpha will be decreased iteratively until the condition is met or alpha reaches zero. Value is expressed as a fraction, thus 0.002 means 0.2%."
      qt_offset_frac:
        type: float
        default: 0.1
        mandatory: false
        description: "Offset fraction for the boundary of the root quadtree as a fraction of the data range. This will leave an extra margin around the data to avoid edge effects."
      qt_data_frac_capacity:
        type: float
        default: 0.015
        mandatory: false
        description: "Fraction of the total number of data points to be used as the capacity of each quadtree node. Any quadtree node that goes above the capacity will be split further."
      qt_subdivision_factor:
        type: int
        default: 4
        mandatory: false
        description: "Subdivision factor for searching dense leaves of the quadtree. Higher values lead to more subdivisions and finer search."
      concave_hull_scale_factor:
        type: float
        default: 0.0
        mandatory: false
        description: "Scaling factor for the concave hull to be used when checking for extrapolation. For example, 0.1 results in a 10% size increase of the hull. A value of 0.0 means no scaling."
  safeguard:
    name: "safeguard"
    name_pretty: "Active Learning Safeguard Settings"
    description: "Settings for active learning safeguard mechanisms. The safeguard will run long MD simulations on selected structures and perform an uncertainty quantification check in order to determine if the active learning loop is robust enough to stop at the current point."
    mandatory: true
    enable:
      description: "Whether to enable the safeguard mechanism."
      type: bool
      mandatory: true
      default: false
    target_structure_mode:
      name: "target_structure_mode"
      name_pretty: "Safeguard - Target Structure Mode"
      description: "Type of structures to include in the safeguard. Multiple types can be selected. If `base` is provided, the structures labelled as 'base' in the initial database will be used as target structures, after applying lateral expansion controlled with the base_struct_supercell_size option. If `target` is provided, a selection of targeted structures (via paths or mdb_id) must be included through the `struct_target_list` option below."
      type: str
      default: "base"
      mandatory: true
      choices: ["base", "target"]
    base_struct_supercell_size:
      description: "3D vector representing the lateral expansion factors to be used. Only used if `target_structure_mode` is set to `base`."
      type: list[int]
      default: [3, 3, 3]
      depends_on:
        key: safeguard.target_structure_mode
        value: "base"
      mandatory: false
    struct_target_list:
      description: "List of structure IDs or paths to be used as target structures in the safeguard. Only used if `target_structure_mode` is set to `target`."
      type: list[str, int]
      depends_on:
        key: safeguard.target_structure_mode
        value: "target"
      mandatory: false
    ignore_container:
      description: "Whether to ignore the container specified in the container settings for the safeguard."
      type: bool
      mandatory: false
      default: false
    md:
      name: "safeguard_md"
      name_pretty: "Safeguard MD Settings"
      description: "MD simulation options for safeguard."
      depends_on:
        key: safeguard.enable
        value: true
      parameters:
        name: "safeguard_md_parameters"
        name_pretty: "Safeguard MD Parameters"
        description: "MD simulation parameters for safeguard. These settings will override the general MD settings for the safeguard simulations. This section supports the same parameters as the `md.parameters` section."
        mandatory: true
        depends_on:
          key: safeguard.enable
          value: true
        wildcard_entry: true
        wildcard_path: "md.parameters"
        wildcard_level: 1
    metadata:
      description: "AiiDA metadata and scheduler options for the safeguard."
      mandatory: true
      depends_on:
        key: safeguard.enable
        value: true
      computer:
        description: "AiiDA computer name for safeguard calculations."
        type: str
        mandatory: true
        example: "my_cluster"
      prepend_text:
        description: "Text to prepend to job scripts for AiiDA."
        type: str
        mandatory: false
        example: "module load singularity\nexport PATH=$PATH:."
      options:
        description: "AiiDA scheduler options for safeguard calculations."
        type: dict
        mandatory: true
  md:
    name: "md"
    name_pretty: "Molecular Dynamics Settings"
    description: "Settings for MD simulations."
    ignore_container:
      description: "Whether to ignore the container specified in the container settings for the MD calculations."
      type: bool
      mandatory: false
      default: false
    parameters:
      description: "MD simulation parameters."
      temperature_list_K:
        description: "List of different temperatures (in K) for MD simulations."
        type: list[float]
        mandatory: true
        default: [300.0, 500.0, 900.0]
      sample_frames_during_md:
        type: bool
        description: "Whether to sample frames during MD simulations for AL."
        mandatory: false
        default: false
      al_keep_struct_every_n_ps:
        description: "Keep a structure every N picoseconds of MD simulation."
        type: float
        mandatory: true
        default: 0.5
      log_save_interval:
        description: "Log energy and force information every N MD steps."
        type: int
        mandatory: false
        default: 1
      num_at_large_struct:
        description: "Number of structures with a number of atoms larger than `large_struct_size` to consider for MD simulations."
        type: int
        mandatory: false
        default: None
      max_temp_multiplier:
        description: "Multiplier for MD temperature to determine the upper bound of the temperature."
        type: float
        mandatory: true
        default: 1.3
      num_steps:
        description: "Total number of timesteps for each MD simulation."
        type: int
        mandatory: true
        default: 33334
      timestep_duration_ps:
        description: "Duration of each timestep in picoseconds."
        type: float
        mandatory: true
        default: 0.003
      md_thermostat:
        description: "Ensemble used in the MD simulation. The ensemble parameter changes the selection of the ASE integrator and thermostat and barostat. `langevin` and `nvt` ensembles use the ASE Langevin thermostat. `npt` and `npt-mtk` uses ASE's implementation of the Full Martyna-Tobias-Klein (MTK) method [^1], similar to the one used for NPT in LAMMPS. The `npt-melchionna` ensemble uses a combined Nose-Hoover and Parrinello-Rahman  method, as proposed by Melchionna et al. and provided in ASE as the default NPT class. However, this implementation is not recommended for use by ASE due stability issues!  \n[^1] MTKNPT: https://ase-lib.org/ase/md.html#full-martyna-tobias-klein-mtk-dynamics"
        type: str
        mandatory: false
        default: "langevin"
        choices: ["langevin", "nvt", "npt", "npt-mtk", "npt-melchionna"]
      langevin_friction_ps-1:
        description: "Friction coefficient for the Langevin thermostat in picoseconds."
        type: float
        mandatory: true
        default: 10.0
        depends_on:
          key: safeguard.md_parameters.md_thermostat
          value: ["nvt", "langevin"]
      npt_ttime_fs:
        description: "Time constant for temperature coupling in NPT thermostat in femtoseconds."
        type: float
        mandatory: true
        default: 100.0
        depends_on:
          key: safeguard.md_parameters.md_thermostat
          value: "npt"
      npt_ptime_fs:
        description: "Time constant for pressure coupling in NPT thermostat in femtoseconds."
        type: float
        mandatory: true
        default: 25.0
        depends_on:
          key: safeguard.md_parameters.md_thermostat
          value: ["npt", "npt-mtk", "npt-melchionna"]
      md_stage_order:
        description: "List containing the names of the stages, written in the order in which the MD stages will be applied. Each stage must be defined under `md.parameters.stages`."
        type: list[str]
        mandatory: true
        depends_on:
          key: md.parameters.stages
          value: "*"
        default: []
        example: ["stage1", "nvt_1", "stage_2", "npt_1", ...]
      gather_traj_cnt_lattice:
        description: "Consider constant lattice when gathering trajectories."
        type: bool
        mandatory: true
        default: true
      use_kokkos:
        description: "Whether to use Kokkos to run the MD."
        type: bool
        mandatory: true
        default: true
      device:
        description: "Device for the MACE model in MD simulations."
        type: str
        mandatory: true
        default: "cuda"
        choices: ["cpu", "cuda"]
      enable_cueq:
        description: "Enable CUEQ for MACE."
        type: bool
        mandatory: false
        default: false
      default_dtype:
        description: "Default data type for the MACE model in MD simulations."
        type: str
        mandatory: true
        default: "float32"
        choices: ["float32", "float64"]
      max_energy_threshold_per_atom:
        description: "Maximum energy threshold per atom in eV."
        type: float
        mandatory: false
        default: 1000.0
      num_cpus_large_struct:
        description: "Number of CPUs to use for structures larger than `large_struct_size`."
        type: int
        mandatory: false
        default: 16
      stages:
        # depends_on:
        #   key: md.parameters.md_stage_order
        #   value: "*"
        name_pretty: "MD Simulation Stages"
        description: "Collection of named keys representing a particular stage of an MD simulation. These stages will be chained together and applied to single MD calculation job following the order defined in `md.parameters.md_stage_order`, resulting in a continuous MD calculation with different settings for every stage. Each stage key will contain contain settings to be applied during each stage, overriding the default MD settings specified under `md.parameters`. Each dictionary must contain a mandatory `use_during_al_steps` or `use_for_structure_types` key, which specifies when given stage must be run. If none of these two keys are not present, the stage will be ignored."
        # type: list[dict]
        # mandatory: true
        dynamic_keys: true
        schema_under_dynamic_keys:
          use_during_al_steps:
            description: "String representing a number of AL steps or interval of AL steps in which the stage will be used. For example, `0` means that the stage will be used during step 0, while `3-6` means that the stage will be used from AL step 3 to AL step 6 (inclusive). The example `'0-1, 3, 4, 5-9, 11'` would execute the current stage for steps 0, 1, 3, 4, 5, 6, 7, 8, 9, and 11."
            type: str
            mandatory: false
            example: "0-1, 3, 4, 5-9, 11"
          use_for_structure_types:
            description: "List of structure types for which to use the current stage. Structure types must be among those defined in the initial database (e.g., `bulk`, `surface`, `cluster`), if a structure contains multiple types, the stage will be applied if at least one type matches for the initial structure in the MD simulation."
            type: list[str]
            mandatory: false
            # default: ["bulk", "surface", "cluster"]
            choices: ["bulk", "surface", "cluster"]
          md_parameters:
            wildcard_entry: true
            wildcard_path: "md.parameters"
            wildcard_level: 1
        #   description: "Symbol of the element defining the cluster."
        #   type: str
        #   mandatory: false
    filters:
      name: "filters"
      name_pretty: "MD Trajectory Filters"
      description: "Settings for MD trajectory filters."
      save_filtered_structures:
        description: "Whether to save filtered structures."
        type: bool
        mandatory: false
        default: false
      check_atoms_no_neighbor:
        description: "Filter for structures with atoms that have no neighbors."
        enable:
          type: bool
          default: true
        covalent_radius_multiplier:
          description: "Multiplier for covalent radii to define cutoff for neighbor check."
          type: float
          default: 1.05
      layer_distance:
        description: "Filter for layer distances in surface slabs."
        enable:
          type: bool
          default: true
        max_layer_distance_ang:
          description: "Maximum accepted distance between layers in Angstrom."
          type: float
          default: 3.5
      exploding_structures:
        description: "Filter for exploding structures based on covalent radius limits."
        enable:
          description: "Whether to enable the exploding structures filter."
          type: bool
          mandatory: false
          default: true
        cov_rad_multiplier_max:
          description: "Maximum multiplier for covalent radius threshold."
          type: float
          mandatory: false
          default: 10.0
        cov_rad_multiplier_min:
          description: "Minimum multiplier for covalent radius threshold."
          type: float
          mandatory: false
          default: 1.5
        explode_check_interval_perc:
          description: "Interval percentage (as a fraction) of MD steps to check for exploding structures."
          type: float
          mandatory: false
          default: 0.1
        max_F:
          description: "Maximum force component allowed in the structure."
          type: float
          mandatory: false
          default: 25.0
        max_V:
          description: "Maximum velocity component allowed in the structure."
          type: float
          mandatory: false
          default: 2.0
    metadata:
      name: "md_metadata"
      name_pretty: "MD Metadata and Scheduler Options (AiiDA)"
      description: "AiiDA metadata and scheduler options for MD simulations."
      code:
        description: "AiiDA code name for MD software."
        type: str
        example: "mace_lammps@cluster"
        mandatory: false
      computer:
        description: "AiiDA computer name for MD calculations."
        type: str
        mandatory: true
        example: "my_cluster"
      prepend_text:
        description: "Text to prepend to job scripts for AiiDA."
        type: str
        mandatory: false
        example: "module load singularity\nexport PATH=$PATH:."
      options:
        description: "AiiDA scheduler options for MD calculations."
        type: dict
        mandatory: false
  code:
    name: "code"
    name_pretty: "Code and Containerization Settings"
    description: "Settings for containerized code execution."
    container:
      description: "Container settings for code execution."
      use_container:
        description: "Whether to use a containerized version of the code."
        type: bool
        mandatory: false
        default: false
      image_name:
        description: "Path to the container image on calculation nodes."
        type: str
        mandatory: false
        example: "/path/to/container.sif"
      engine_command:
        description: "Command template for the container engine."
        type: str
        mandatory: false
        example: "singularity exec --bind .:/mdb_data --nv --contain --writable-tmpfs {image_name}"
      prepend_text:
        description: "Text to prepend to job scripts for container setup."
        type: str
        mandatory: false
        example: "module load singularity\nexport PATH=$PATH:."
  mace_train:
    name: "mace_train"
    name_pretty: "MLIP Training Settings"
    description: "Settings for MACE model training."
    result_force_weight:
      description: "Weight of the force when considering model performance in weighted sum calculation."
      type: float
      mandatory: false
      default: 0.1
    test_fraction:
      description: "Fraction of the training data to be used for testing."
      type: float
      mandatory: false
      default: 0.1
    code:
      description: "AiiDA code name for MACE training."
      type: str
      mandatory: true
      example: "mace_train@cluster"
    computer:
      description: "AiiDA computer name for MACE training."
      type: str
      mandatory: true
      example: "my_cluster"
    ignore_container:
      description: "Whether to ignore container settings for MACE training."
      type: bool
      mandatory: false
      default: false
    multihead_finetuning:
      description: "Whether to use multihead finetuning."
      type: bool
      mandatory: false
      default: false
    metadata:
      description: "AiiDA metadata and scheduler options for MACE training."
      type: dict
      mandatory: false
    train_settings:
      description: "MACE training parameters and hyperparameters."
      type: dict
      mandatory: false
  committee_eval:
    name: "committee_eval"
    name_pretty: "Committee Evaluation Settings"
    description: "Settings for committee evaluation using multiple MLIP models."
    committee_num_models:
      description: "Total number of MLIP models in the committee."
      type: int
      mandatory: false
      default: 4
    openmp_threads:
      description: "Number of OpenMP threads for MLIP CPU evaluation."
      type: int
      mandatory: false
      default: 24
    ignore_container:
      description: "Whether to ignore container settings for committee evaluation."
      type: bool
      mandatory: false
      default: false
    prepend_text:
      description: "Text to prepend to job scripts for committee evaluation."
      type: str
      mandatory: false
    mace:
      name: "mace"
      name_pretty: "Commitee Evaluation - MACE Settings"
      description: "Settings for MACE evaluator."
      device:
        description: "Device for MACE evaluation."
        type: str
        mandatory: false
        default: "cpu"
        choices: ["cpu", "cuda"]
      default_dtype:
        description: "Default data type for MACE evaluation."
        type: str
        mandatory: false
        default: "float32"
        choices: ["float32", "float64"]
      batch_size:
        description: "Batch size for MACE evaluation."
        type: int
        mandatory: false
        default: 32
      compute_stress:
        description: "Whether to compute stress during evaluation."
        type: bool
        mandatory: false
        default: false
    metadata:
      description: "AiiDA metadata and scheduler options for committee evaluation."
      type: dict
      mandatory: false
  descriptors:
    name: "descriptors"
    name_pretty: "Descriptor Computation Settings"
    description: "Settings for descriptor computation and dimensionality reduction."
    descriptor_type:
      description: "Type of descriptor to compute."
      type: str
      mandatory: true
      default: "mace"
      choices: ["mace", "soap"]
    dimensionality_reduction_method:
      description: "Dimensionality reduction method for MACE descriptors."
      type: str
      mandatory: false
      default: "none"
      choices: ["autoencoder", "pca", "none"]
    ignore_container:
      description: "Whether to ignore container settings for descriptor computation."
      type: bool
      mandatory: false
      default: false
    metadata:
      description: "AiiDA metadata for descriptor computation."
      type: dict
      mandatory: true
      options:
        description: "AiiDA scheduler options for descriptor computation."
        type: dict
        mandatory: true
    dtype:
      description: "Data type of descriptor to compute."
      type: str
      mandatory: false
      default: "float32"
      choices: ["float32", "float64"]
    device:
      description: "Device for descriptor computation."
      type: str
      mandatory: false
      default: "cpu"
      choices: ["cpu", "cuda"]
    autoencoder:
      name: "autoencoder"
      name_pretty: "Autoencoder Dimensionality Reduction Settings"
      description: "Settings for autoencoder-based dimensionality reduction."
      depends_on:
        key: descriptors.dimensionality_reduction_method
        value: "autoencoder"
      train_settings:
        description: "Training settings for the autoencoder."
        mandatory: true
        depends_on:
          key: descriptors.dimensionality_reduction_method
          value: "autoencoder"
        device:
          description: "Device for autoencoder training."
          type: str
          mandatory: true
          default: "cuda"
          choices: ["cpu", "cuda"]
        dtype:
          description: "Data type for autoencoder training."
          type: str
          mandatory: true
          default: "float32"
          choices: ["float32", "float64"]
        model_path:
          description: "Path to save the autoencoder model."
          type: str
          mandatory: false
          default: "autoencoder_model.pth"
        load_model:
          description: "Whether to load the model from the model path."
          type: bool
          mandatory: false
          default: false
        dataset:
          description: "Path to the training dataset."
          type: str
          mandatory: false
          default: "all_descriptors.npz"
        l1_hidden_dim:
          description: "Number of units in the first hidden layer."
          type: int
          mandatory: false
          default: 256
        l2_hidden_dim:
          description: "Number of units in the second hidden layer."
          type: int
          mandatory: false
          default: 32
        bottleneck_dim:
          description: "Dimensionality of the bottleneck (latent space)."
          type: int
          mandatory: false
          default: 2
        bias_flag:
          description: "Flag to include bias terms in the layers."
          type: bool
          mandatory: false
          default: true
        num_epochs:
          description: "Number of epochs to train the model."
          type: int
          mandatory: true
          default: 50
        batch_size:
          description: "Batch size for training."
          type: int
          mandatory: false
          default: 2048
        patience:
          description: "Patience for early stopping."
          type: int
          mandatory: false
          default: 5
        lr:
          description: "Learning rate for the optimizer."
          type: float
          mandatory: false
          default: 0.001
        weight_decay:
          description: "L2 regularization parameter."
          type: float
          mandatory: false
          default: 1e-5
        loss:
          description: "Loss function type."
          type: str
          mandatory: false
          default: "mse"
          choices: ["mse", "mae"]
        train_frac:
          description: "Fraction of the data to use for training."
          type: float
          mandatory: false
          default: 0.8
        valid_frac:
          description: "Fraction of the data to use for validation."
          type: float
          mandatory: false
          default: 0.1
        test_frac:
          description: "Fraction of the data to use for testing."
          type: float
          mandatory: false
          default: 0.1
        wandb:
          description: "Whether to log metrics to wandb."
          type: bool
          mandatory: false
          default: false
        wandb_name:
          description: "Name of the wandb run."
          type: str
          mandatory: false
          default: ""
        wandb_project:
          description: "Name of the wandb project."
          type: str
          mandatory: false
          default: ""
  dft:
    name: "dft"
    name_pretty: "DFT Calculation Settings"
    description: "DFT settings specific to active learning (different from top-level dft section)."
    ignore_container:
      description: "Whether to ignore container settings for DFT calculations."
      type: bool
      mandatory: false
      default: false
    dft_method:
      description: "Selection of DFT calculator."
      type: str
      mandatory: false
      default: "mace"
      choices: ["vasp", "mace"]
    calc_type:
      description: "Type of calculation."
      type: str
      mandatory: false
      default: "single_point"
      choices: ["single_point", "relax", "static"]
    dft_calc_limit:
      description: "Maximum number of DFT calculations to perform per AL step."
      type: int
      mandatory: false
      default: None
    mace:
      name: "mace"
      name_pretty: "MACE DFT Calculator Settings"
      description: "MACE settings as DFT calculator."
      depends_on:
        key: dft.dft_method
        value: "mace"
      mandatory: false
      mace_potential_path:
        description: "Path to MACE potential file."
        type: str
        mandatory: true
        example: "model.model"
      settings:
        description: "Options for MACE that will be passed as arguments during execution."
        device:
          description: "Device for MACE calculations."
          type: str
          mandatory: false
          default: "cuda"
          choices: ["cpu", "cuda"]
        default_dtype:
          description: "Default data type for MACE calculations."
          type: str
          mandatory: false
          default: "float64"
          choices: ["float32", "float64"]
        batch_size:
          description: "Batch size for MACE calculations."
          type: int
          mandatory: false
          default: 11
        compute_stress:
          description: "Whether to compute stress."
          type: bool
          mandatory: false
          default: false
      metadata:
        description: "AiiDA metadata for MACE calculations."
        type: dict
        mandatory: false
      options:
        description: "AiiDA scheduler options for MACE calculations."
        type: dict
        mandatory: false
      filter:
        description: "Settings for filtering structures after DFT calculations, based on energy and force thresholds."
        mandatory: false
        filter_dft_calcs:
          description: "Whether to filter structures based on energy and force thresholds."
          type: bool
          mandatory: false
          default: false
        threshold_E_meV:
          description: "Energy threshold in meV/atom for filtering structures."
          type: float
          mandatory: false
          default: 1000.0
        threshold_F_meV:
          description: "Force threshold in meV/Å for filtering structures."
          type: float
          mandatory: false
          default: 10000.0
    vasp:
      name: "vasp"
      name_pretty: "VASP DFT Calculator Settings"
      description: "VASP settings as DFT calculator."
      depends_on:
        key: dft.dft_method
        value: "vasp"
      mandatory: false
      calc_type:
        description: "Type of calculation."
        type: str
        mandatory: false
        default: "static"
        choices: ["static", "relax"]
      dft_calc_limit:
        description: "Maximum number of DFT calculations to perform per AL step."
        type: int
        mandatory: false
        default: 200
      potential_family:
        description: "VASP potential family name."
        type: str
        mandatory: true
        example: "vasp-5.4-PBE-2024"
      structure_types:
        description: "List of structure types to process."
        type: list[str]
        mandatory: false
        default: ["bulk", "surface", "cluster"]
        choices: ["bulk", "surface", "cluster"]
      filter:
        description: "Settings for filtering structures after DFT calculations, based on energy and force thresholds."
        mandatory: false
        filter_dft_calcs:
          description: "Whether to filter structures based on energy and force thresholds."
          type: bool
          mandatory: false
          default: false
        threshold_E_meV:
          description: "Energy threshold in meV/atom for filtering structures."
          type: float
          mandatory: false
          default: 1000.0
        threshold_F_meV:
          description: "Force threshold in meV/Å for filtering structures."
          type: float
          mandatory: false
          default: 10000.0
      queue:
        description: "Queue settings for VASP calculations."
        queue_type:
          description: "Scheduler type."
          type: str
          mandatory: true
          deprecated_aliases: ["type"]
          default: "slurm"
        computer:
          description: "AiiDA computer name for VASP calculations."
          type: str
          mandatory: true
          example: "aiida-computer-name"
        code_string:
          description: "Name of the VASP code as defined in AiiDA."
          type: str
          mandatory: true
          example: "vasp@computer"
        withmpi:
          description: "Whether to run with MPI."
          type: bool
          mandatory: false
          default: false
        qos:
          description: "Quality of service parameter."
          type: str
          mandatory: false
          example: "gp_partition"
        account:
          description: "Account to be used for calculations."
          type: str
          mandatory: false
          example: "account_name"
        node_cpus:
          description: "Number of CPUs per node."
          type: int
          mandatory: false
          default: 48
        max_wallclock_seconds:
          description: "Maximum wallclock time in seconds."
          type: int
          mandatory: false
          default: 28800
        options_resources:
          description: "Resource options for the scheduler."
          type: dict
          mandatory: false
          example: { "tot_num_mpiprocs": 112, "num_machines": 1 }
        multiple:
          description: "Multiple factor for resources."
          type: int
          mandatory: false
          default: 1
        custom_scheduler_commands:
          description: "Custom scheduler commands."
          type: str
          mandatory: false
      kspacing:
        description: "K-spacing settings for different phases or default value. The k-spacing values will be applied on a per-phase basis, according to the keys added to the dictionary which must match phases in the database. The `MDB_DEFAULT` key can be used to set a default k-spacing value for all phases not explicitly listed."
        type: dict
        mandatory: false
        example: { "MDB_DEFAULT": 0.150, "alpha": 0.135 }
      incar:
        description: "INCAR settings for VASP calculations."
        type: dict
        mandatory: false
        example: { "istart": 0, "icharg": 2, "gga": "Pe", "encut": 450 }
      surface:
        description: "Surface-specific INCAR settings."
        incar:
          description: "INCAR settings specific to surface calculations."
          type: dict
          mandatory: false
          example: { "ldipol": true, "idipol": 3, "ispin": 2 }
      cluster:
        description: "Cluster-specific INCAR settings."
        incar:
          description: "INCAR settings specific to cluster calculations."
          type: dict
          mandatory: false
          example: { "ldipol": true, "dipol": [0.5, 0.5, 0.5], "idipol": 4 }
      aiida_vasp:
        name: "aiida_vasp"
        name_pretty: "AiiDA-VASP Settings"
        description: "AiiDA-VASP specific settings."
        parser_settings:
          description: "Contains entries to include in the results gathered using the aiida-vasp parser settings"
          type: dict
          mandatory: false
          example:
            {
              "add_trajectory": false,
              "add_bands": false,
              "add_charge_density": false,
              "add_dos": false,
              "add_kpoints": false,
              "add_energies": true,
              "add_misc": true,
              "add_structure": false,
              "add_projectors": false,
              "add_born_charges": false,
              "add_dielectrics": false,
              "add_hessian": false,
              "add_dynmat": false,
              "add_wavecar": false,
              "add_forces": false,
              "add_stress": false,
            }
        critical_notifications:
          name: "critical_notifications"
          name_pretty: "AiiDA-VASP Critical Notifications"
          description: "Critical error and warning notifications. These represent VASP errors and warnings to be treated as critical, which will result in an error code being thrown by the aiida calculation job. The example contains all defults."
          type: dict
          mandatory: false
          example:
            {
              "add_brmix": true,
              "add_cnormn": true,
              "add_denmp": true,
              "add_dentet": true,
              "add_edddav_zhegv": true,
              "add_eddrmm_zhegv": true,
              "add_edwav": true,
              "add_fexcp": true,
              "add_fock_acc": true,
              "add_non_collinear": true,
              "add_not_hermitian": true,
              "add_psmaxn": true,
              "add_pzstein": true,
              "add_real_optlay": true,
              "add_rhosyg": true,
              "add_rspher": true,
              "add_set_indpw_full": true,
              "add_sgrcon": true,
              "add_no_potimm": true,
              "add_magmom": true,
              "add_bandocc": true,
            }

mlip_benchmarks:
  description: "Settings for MLIP benchmarking (evaluate_mlip_performance)."
  general:
    description: "General benchmark settings."
    output_dir:
      description: "Directory to save benchmark results."
      type: str
      mandatory: true
      default: "./mlip_evaluation"
    metal:
      description: "Metal symbol for the benchmark systems."
      type: str
      mandatory: true
      default: "Cu"
    device:
      description: "Device to run calculations on."
      type: str
      mandatory: false
      default: "cuda"
      choices: ["cuda", "cpu"]
    dtype:
      description: "Data type for calculations."
      type: str
      mandatory: false
      default: "float64"
      choices: ["float32", "float64"]
    no_rich_ui:
      description: "Disable Rich UI and use plain text output."
      type: bool
      mandatory: false
      default: false
  models:
    description: "Model specifications for benchmarking."
    model_files:
      description: "List of paths to .model files."
      type: list[str]
      mandatory: false
      default: []
      example: ["/path/to/model1.model", "/path/to/model2.model"]
    aiida_pks:
      description: "List of AiiDA workchain PKs/UUIDs to load models from."
      type: list[int]
      mandatory: false
      default: []
      example: [12345, 67890]
    foundation_models:
      description: "List of foundation model specifications. Format: 'library:model_name'."
      type: list[str]
      mandatory: false
      default: []
      example: ["mace:small", "mace:medium", "mace:large"]
  slab_generation:
    description: "Settings for slab generation in benchmarks."
    surface_indices:
      description: "Miller indices for the surface."
      type: list[int]
      mandatory: false
      default: [1, 1, 1]
      example: [1, 1, 1]
    supercell_size:
      description: "Size of the supercell (x, y, z)."
      type: list[int]
      mandatory: false
      default: [3, 3, 4]
      example: [3, 3, 4]
    vacuum:
      description: "Vacuum layer in Angstrom."
      type: float
      mandatory: false
      default: 10.0
  md_parameters:
    description: "Molecular dynamics simulation parameters."
    temp:
      description: "MD temperature in Kelvin."
      type: float
      mandatory: false
      default: 300.0
    n_steps:
      description: "Number of MD steps."
      type: int
      mandatory: false
      default: 10000
    timestep:
      description: "MD timestep in femtoseconds."
      type: float
      mandatory: false
      default: 2.0
    friction:
      description: "Friction coefficient for Langevin dynamics."
      type: float
      mandatory: false
      default: 0.005
  benchmarks:
    description: "Selection of benchmarks to run."
    run_energy_md:
      description: "Run the energy MD benchmark."
      type: bool
      mandatory: false
      default: false
    run_accuracy_test_set:
      description: "Run energy and force error benchmark on a test set."
      type: bool
      mandatory: false
      default: false
    run_elastic_properties:
      description: "Run elastic properties benchmark."
      type: bool
      mandatory: false
      default: false
    run_defect_formation_energy:
      description: "Run defect formation energy benchmark."
      type: bool
      mandatory: false
      default: false
    run_surface_energies:
      description: "Run surface energies benchmark."
      type: bool
      mandatory: false
      default: false
    run_phonon_dispersion:
      description: "Run phonon dispersion benchmark."
      type: bool
      mandatory: false
      default: false
    run_high_temp_md:
      description: "Run high-temperature MD benchmark."
      type: bool
      mandatory: false
      default: false
    run_melting_point:
      description: "Run melting point calculation benchmark."
      type: bool
      mandatory: false
      default: false
    run_gsfe:
      description: "Run Generalized Stacking Fault Energy (GSFE) benchmark."
      type: bool
      mandatory: false
      default: false
    run_learning_curves:
      description: "Plot learning curves from AL runs."
      type: bool
      mandatory: false
      default: false
    run_final_db_size:
      description: "Compare final database sizes from AL runs."
      type: bool
      mandatory: false
      default: false
    run_md_count:
      description: "Count total MD calculations performed during AL loops."
      type: bool
      mandatory: false
      default: false
    run_evaluate_database:
      description: "Evaluate models against a user-provided structure database."
      type: bool
      mandatory: false
      default: false
    run_magic_cluster:
      description: "Run magic number cluster benchmark."
      type: bool
      mandatory: false
      default: false
  test_set:
    description: "Test set configuration for accuracy benchmarks."
    mandatory: false
    name_pretty: "Test Set Benchmark Settings"
    test_set_path:
      description: "Path to the held-out test set for accuracy benchmarks."
      type: str
      mandatory: false
      example: "/path/to/test_set.xyz"
  database_evaluation:
    description: "Configuration for database evaluation benchmark."
    mandatory: false
    name_pretty: "Database Evaluation Benchmark Settings"
    database_path:
      description: "Path to the structure database file for evaluation."
      type: str
      mandatory: false
      example: "/path/to/database.xyz"
  magic_cluster:
    description: "Magic cluster benchmark settings."
    name: "magic_cluster"
    name_pretty: "Magic Cluster Benchmark Settings"
    mandatory: false
    magic_cluster_dft_refs:
      description: "Path to JSON file with DFT reference energies for magic clusters."
      type: str
      mandatory: false
      example: "/path/to/dft_refs.json"
    magic_cluster_sizes:
      description: "List of magic number cluster sizes to test."
      type: list[int]
      mandatory: false
      default: [13, 19, 55, 147, 309, 561]
  surface_energy_benchmark:
    description: "Surface energy benchmark specific settings."
    name: "surface_energy_benchmark"
    name_pretty: "Surface Energy Benchmark Settings"
    mandatory: false
    plot_relative_dft:
      type: bool
      description: "Whether to plot the vacancy formation energies relative to DFT reference values. If false, absolute values of the vacancy formation energies will be plotted."
      mandatory: false
      default: false
    create_slab_settings:
      description: "Settings to create slabs for surface energy calculations."
      mandatory: false
      slab_layers:
        description: "Number of layers in the slab."
        type: int
        mandatory: false
        default: 7
      vacuum_thickness:
        description: "Vacuum thickness in Angstrom."
        type: float
        mandatory: false
        default: 15.0
      supercell_size:
        description: "Supercell size for the slab (x, y, z)."
        type: list[int]
        mandatory: false
        default: [3, 3, 1]
    dft_refs:
      description: "Path to JSON file with DFT reference energies."
      type: str
      mandatory: false
      example: "/path/to/surface_energies.json"
    bulk_structure:
      description: "Path to DFT-optimized bulk structure file."
      type: str
      mandatory: false
      example: "/path/to/bulk.xyz"
    slab_structures:
      description: "Dictionary of slab structures with surface indices as keys."
      type: dict
      mandatory: false
      dynamic_keys: true
      # example: { "100": "/path/to/slab_100.xyz", "110": "/path/to/slab_110.xyz" }
      schema_under_dynamic_keys:
        path:
          description: "Path to slab structure file for given surface indices."
          type: str
          mandatory: true
          example: "/path/to/slab_100.xyz"
  melting_point_benchmark:
    description: "Melting point benchmark settings."
    mandatory: false
    name_pretty: "Melting Point Benchmark Settings"
    supercell_size:
      description: "Supercell size for melting point calculation (x, y, z)."
      type: list[int]
      mandatory: false
      default: [6, 6, 6]
    solid_temp_K:
      description: "Temperature in Kelvin for solid phase."
      type: float
      mandatory: false
      default: 1100.0
    liquid_temp_K:
      description: "Temperature in Kelvin for liquid phase."
      type: float
      mandatory: false
      default: 1600.0
    nve_initial_T_test_K:
      description: "Initial temperature in Kelvin for NVE test."
      type: float
      mandatory: false
      default: 800.0
    melting_point_supercell_path:
      description: "Path to the supercell structure file for melting point calculation."
      type: str
      mandatory: false
      example: "/path/to/supercell.xyz"
  defect_formation_energy:
    description: "Defect formation energy benchmark settings. This test will create a vacancy in a bulk supercell and compute its formation energy. \nAlternatively, the user can provide a set of stochiometrically balanced structructures representing the bulk and vacancy-containing systems, along with any species that need to be removed to create the vacancy, and the benchmark will use these structures instead of generating them internally"
    name: "defect_formation_energy"
    name_pretty: "Vacancy Formation Energy Benchmark Settings"
    mandatory: false
    depends_on:
      key: mlip_benchmarks.benchmarks.run_defect_formation_energy
      value: true
    plot_relative_dft:
      type: bool
      description: "Whether to plot the vacancy formation energies relative to DFT reference values. If false, absolute values of the vacancy formation energies will be plotted."
      mandatory: false
      default: false
    generate_automatically:
      description: "Whether to generate bulk and vacancy structures automatically. If this is set to false, the user must provide reference energies and structures."
      type: bool
      mandatory: true
      default: true
    use_static_calculations:
      description: "Whether to use the DFT-generated structures directly, or to optimize them using the MLIP."
      type: bool
      mandatory: true
      default: true
    supercell_size:
      description: "Supercell size for the bulk for vacancy formation energy calculation (x, y, z). Only used when generate_automatically is enabled."
      type: list[int]
      mandatory: true
      default: [4, 4, 4]
      depends_on:
        key: defect_formation_energy.generate_automatically
        value: true
    bulk_metal_symbol:
      description: "Symbol of the metal for the bulk structure. Only used when generate_automatically is enabled."
      type: str
      mandatory: false
      example: "/path/to/bulk.xyz"
      depends_on:
        key: defect_formation_energy.generate_automatically
        value: true
    user_provided_structures:
      description: "User-provided structures for vacancy formation energy calculation. The user might add however many structures as needed, each under an uniquely named key nested under 'user_provided_structures', which will contain name, path, and stoichiometry balancing factor as subkeys. Only used when generate_automatically is disabled."
      type: dict
      mandatory: false
      dynamic_keys: true
      depends_on:
        key: defect_formation_energy.generate_automatically
        value: false
      schema_under_dynamic_keys:
        path:
          description: "Path containing the structure in an ASE readable format."
          type: str
          mandatory: true
          example: "/path/to/structure.xyz"
        stoichiometry_balancing_factor:
          description: "Balancing factor with sign indicating how the structure contributes in the balancing of stoichiometry when creating the vacancy. A negative value (e.g., -2) indicates species to be removed. A positive value (e.g., 2) indicates species to be added."
          type: int
          example: -2
          mandatory: true
    user_provided_dft_ref:
      description: "Path to JSON file with DFT reference energies for user-provided structures. The DFT references should correspond to the user-provided structure names. Only used when generate_automatically is disabled."
      type: str
      mandatory: false
      example: "/path/to/dft_refs.json"
      depends_on:
        key: defect_formation_energy.generate_automatically
        value: false

latent_space_analysis:
  description: "Settings for the latent space analysis utility, which allows to analyze the latent space of datasets and visualize the results. This can be used to gain insights into the current database coverage and the distribution of structures in the descriptor space."
  interpolation:
    name: "interpolation"
    name_pretty: "Interpolation Check Settings"
    description: "Settings for the interpolation check. The interpolation check determines whether a structure is within the model's knowledge domain by checking the committee models disagreement, considering the model accuracy threshold."
    mandatory: true
    disagreement_check_type:
      description: "Approach for energy and force (E&F) committee disagreement check. With `training`, compare E&F with a threshold obtained from the training RMSE values multiplied by a threshold. With `md_threshold`, compare E&F with a threshold obtained from the standard deviaiton of the MD frames."
      type: str
      mandatory: true
      default: "training"
      choices: ["training", "md_threshold"]

  extrapolation:
    name: "extrapolation"
    name_pretty: "Extrapolation Check Settings"
    description: "Settings for extrapolation checks."
    check_extrapolation_type:
      description: "Method for extrapolation check. With `min-max` or `basic`, check for extrapolation using the range of the MACE descriptors. With `alpha-shape` or `advanced`, check for extrapolation using the concave hull of the MACE descriptors. With `disabled` or `none`, disable the extrapolation check, only leaving committee disagreement for EF for the domain."
      type: str
      mandatory: false
      default: "none"
      choices: ["disabled", "none", "basic", "min-max", "alpha-shape", "advanced"]
    concave_hull:
      name: "concave_hull"
      name_pretty: "Concave Hull Extrapolation Check Settings"
      description: "Settings for the concave hull / alpha shape extrapolation check."
      mandatory: false
      target_alpha_range_min:
        type: float
        default: 1.0
        mandatory: false
        description: "Minimum alpha value for the concave hull."
      target_alpha_range_max:
        type: float
        default: 50.0
        mandatory: false
        description: "Maximum alpha value for the concave hull."
      default_alpha_if_issues:
        type: float
        default: 5.0
        mandatory: false
        description: "Default alpha value if there are issues with the concave hull generation."
      nn_dist_scale_factor:
        type: float
        default: 1.5
        mandatory: false
        description: "Scaling factor for the alpha candidate calculation, where `alpha_candidate = nn_dist_scale_factor / mean_nn_dist`"
      frac_points_allowed_out:
        type: float
        default: 0.002
        mandatory: false
        description: "Maximum fraction of points allowed to be outside the concave hull. If the fraction of points outside the hull exceeds this value, alpha will be decreased iteratively until the condition is met or alpha reaches zero. Value is expressed as a fraction, thus 0.002 means 0.2%."
      qt_offset_frac:
        type: float
        default: 0.1
        mandatory: false
        description: "Offset fraction for the boundary of the root quadtree as a fraction of the data range. This will leave an extra margin around the data to avoid edge effects."
      qt_data_frac_capacity:
        type: float
        default: 0.015
        mandatory: false
        description: "Fraction of the total number of data points to be used as the capacity of each quadtree node. Any quadtree node that goes above the capacity will be split further."
      qt_subdivision_factor:
        type: int
        default: 4
        mandatory: false
        description: "Subdivision factor for searching dense leaves of the quadtree. Higher values lead to more subdivisions and finer search."
      concave_hull_scale_factor:
        type: float
        default: 0.0
        mandatory: false
        description: "Scaling factor for the concave hull to be used when checking for extrapolation. For example, 0.1 results in a 10% size increase of the hull. A value of 0.0 means no scaling."

  descriptors:
    name: "descriptors"
    name_pretty: "Descriptor Computation Settings"
    description: "Settings for descriptor computation and dimensionality reduction."
    descriptor_type:
      description: "Type of descriptor to compute."
      type: str
      mandatory: true
      default: "mace"
      choices: ["mace", "soap"]
    dimensionality_reduction_method:
      description: "Dimensionality reduction method for MACE descriptors."
      type: str
      mandatory: false
      default: "none"
      choices: ["autoencoder", "pca", "none"]
    ignore_container:
      description: "Whether to ignore container settings for descriptor computation."
      type: bool
      mandatory: false
      default: false
    metadata:
      description: "AiiDA metadata and scheduler options for descriptor computation."
      type: dict
      mandatory: false
    dtype:
      description: "Data type of descriptor to compute."
      type: str
      mandatory: false
      default: "float32"
      choices: ["float32", "float64"]
    device:
      description: "Device for descriptor computation."
      type: str
      mandatory: false
      default: "cpu"
      choices: ["cpu", "cuda"]
    autoencoder:
      name: "autoencoder"
      name_pretty: "Autoencoder Dimensionality Reduction Settings"
      description: "Settings for autoencoder-based dimensionality reduction."
      depends_on:
        key: descriptors.dimensionality_reduction_method
        value: "autoencoder"
      train_settings:
        description: "Training settings for the autoencoder."
        mandatory: true
        depends_on:
          key: descriptors.dimensionality_reduction_method
          value: "autoencoder"
        device:
          description: "Device for autoencoder training."
          type: str
          mandatory: true
          default: "cuda"
          choices: ["cpu", "cuda"]
        dtype:
          description: "Data type for autoencoder training."
          type: str
          mandatory: true
          default: "float32"
          choices: ["float32", "float64"]
        model_path:
          description: "Path to save the autoencoder model."
          type: str
          mandatory: false
          default: "autoencoder_model.pth"
        load_model:
          description: "Whether to load the model from the model path."
          type: bool
          mandatory: false
          default: false
        dataset:
          description: "Path to the training dataset."
          type: str
          mandatory: false
          default: "all_descriptors.npz"
        l1_hidden_dim:
          description: "Number of units in the first hidden layer."
          type: int
          mandatory: false
          default: 256
        l2_hidden_dim:
          description: "Number of units in the second hidden layer."
          type: int
          mandatory: false
          default: 32
        bottleneck_dim:
          description: "Dimensionality of the bottleneck (latent space)."
          type: int
          mandatory: false
          default: 2
        bias_flag:
          description: "Flag to include bias terms in the layers."
          type: bool
          mandatory: false
          default: true
        num_epochs:
          description: "Number of epochs to train the model."
          type: int
          mandatory: true
          default: 50
        batch_size:
          description: "Batch size for training."
          type: int
          mandatory: false
          default: 2048
        patience:
          description: "Patience for early stopping."
          type: int
          mandatory: false
          default: 5
        lr:
          description: "Learning rate for the optimizer."
          type: float
          mandatory: false
          default: 0.001
        weight_decay:
          description: "L2 regularization parameter."
          type: float
          mandatory: false
          default: 1e-5
        loss:
          description: "Loss function type."
          type: str
          mandatory: false
          default: "mse"
          choices: ["mse", "mae"]
        train_frac:
          description: "Fraction of the data to use for training."
          type: float
          mandatory: false
          default: 0.8
        valid_frac:
          description: "Fraction of the data to use for validation."
          type: float
          mandatory: false
          default: 0.1
        test_frac:
          description: "Fraction of the data to use for testing."
          type: float
          mandatory: false
          default: 0.1
        wandb:
          description: "Whether to log metrics to wandb."
          type: bool
          mandatory: false
          default: false
        wandb_name:
          description: "Name of the wandb run."
          type: str
          mandatory: false
          default: ""
        wandb_project:
          description: "Name of the wandb project."
          type: str
          mandatory: false
          default: ""
