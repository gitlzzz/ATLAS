[build-system]
requires = ["setuptools", "wheel", "setuptools-git-versioning"]
build-backend = "setuptools.build_meta"

[project]
name = "MatDBForge"
dynamic = ["version"]
description = "An automatic workflow for generating data and training NNPs"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Pol Sanz", email = "psanz@iciq.es" },
    { name = "Zan Lian", email = "zlian@iciq.es" },
]

dependencies = [
    "ase",
    "dscribe==2.1.0",
    "gunicorn==22.0.0",
    "matplotlib==3.8.0",
    "mp_api",
    "pandas",
    "plotly==5.18.0",
    "rich==13.7.0",
    "scipy==1.11.2",
    "seaborn==0.13.2",
    "mace-torch @ git+https://github.com/ACEsuit/mace.git@v0.3.7",
    "e3nn==0.4.4",
    "aiida-core==2.6.2",
    "aiida-lammps==1.0.1",
    "aiida-vasp==3.1.0",
    "torch",
    "wonderwords==2.2.0",
    "pymatgen",
    "python-slugify[unidecode]",
    "flask",
    "tomli >= 1.1.0 ; python_version < '3.11'",
]

[project.optional-dependencies]
dev = ["pre-commit", "pytest", "pytest-cov"]


[project.urls]
Homepage = "https://github.com/pol-sb/MatDBForge"

[project.entry-points."aiida.calculations"]
"mdb-autoencoder-train" = "MatDBForge.active_learning.extrapolation.autoencoder_tools_aiida:TrainAutoencoderCalculation"
"mdb-get-latent-space" = "MatDBForge.active_learning.extrapolation.autoencoder_tools_aiida:GetLatentSpaceAutoencoderCalculation"
"mdb-get-concave-hull" = "MatDBForge.active_learning.extrapolation.autoencoder_tools_aiida:GetConcaveHullCalculation"
"mace-train" = "MatDBForge.active_learning.mace_tools_aiida:TrainMACEModelCalculation"
"mace-get-descriptors" = "MatDBForge.active_learning.mace_tools_aiida:GetMACEDescriptorsCalculation"
"mace-eval" = "MatDBForge.active_learning.mace_tools_aiida:EvaluateMACEConfigsCalculation"
"mace-lammps-gpu-md" = "MatDBForge.active_learning.mace_tools_aiida:RunMDCalculationGPULAMMPSMACE"
"mace-committee-eval" = "MatDBForge.active_learning.mace_tools_aiida:CheckMACECommitteeResultsCalculation"

[project.entry-points."aiida.calculations.monitors"]
"monitor.davwarning" = "MatDBForge.workflows.monitors:output_monitor"

[project.entry-points."aiida.workflows"]
"mdb-active-learning" = "MatDBForge.workflows.active_learning:ActiveLearningWorkChain"
"mdb-active-learning-base" = "MatDBForge.workflows.active_learning:ActiveLearningBaseWorkChain"

[project.entry-points."aiida.parsers"]
"mdb-autoencoder-train-parser" = "MatDBForge.active_learning.extrapolation.autoencoder_tools_aiida:TrainAutoencoderCalculationParser"
"mdb-get-latent-space-parser" = "MatDBForge.active_learning.extrapolation.autoencoder_tools_aiida:GetLatentSpaceAutoencoderCalculationParser"
"mdb-get-concave-hull-parser" = "MatDBForge.active_learning.extrapolation.autoencoder_tools_aiida:GetConcaveHullCalculationParser"
"mace-training-parser" = "MatDBForge.active_learning.mace_tools_aiida:TrainMACEModelCalculationParser"
"mace-descriptors-parser" = "MatDBForge.active_learning.mace_tools_aiida:GetMACEDescriptorsCalculationParser"
"mace-eval-parser" = "MatDBForge.active_learning.mace_tools_aiida:EvaluateMACEConfigsCalculationParser"
"mace-committee-eval-parser" = "MatDBForge.active_learning.mace_tools_aiida:CheckMACECommiteeResultsCalculationParser"
"mace-lammps-raw-parser" = "MatDBForge.active_learning.mace_tools_aiida:LAMMPSMACERawParser"

[project.scripts]
"mdb_active_learning" = "MatDBForge.core.command_line.cli_active_learning:run_active_learning"
"mdb_gen_configuration_file" = "MatDBForge.core.command_line.cli_generate_configuration_file:gen_default_config"
"mdb_monitor_al_loop" = "MatDBForge.core.command_line.cli_dashboard:monitor_al_loop"
"mdb_gen_init_db" = "MatDBForge.core.command_line.cli_generate_init_db:run_gen_initial_database"
"mdb_init_setup" = "MatDBForge.core.command_line.cli_run_initial_config:run_initial_config"
"mdb_train_autoencoder" = "MatDBForge.core.command_line.cli_train_autoencoder:run_train_autoencoder"

[tool.setuptools]
include-package-data = true
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools-git-versioning]
enabled = true
version_file = "VERSION"
count_commits_from_version_file = true
dev_template = "{tag}.post{ccount}"
dirty_template = "{tag}.post{ccount}+git-{branch}-{sha}"


[tool.commitizen]
name = "cz_customize"
version = "0.11.0"
changelog_incremental = true
update_changelog_on_bump = true
version_files = ["./src/__version__.py", "pyproject.toml:version", "VERSION"]
template = "./docs/commit_template.txt"

[tool.commitizen.customize]
message_template = "{{change_type}}:{% if show_message %} {{message}}{% endif %}"
example = "feature: this feature enable customize through config file"
schema = "<type>: <body>"
schema_pattern = "(feat|fix|chore|docs):(\\s.*)"
bump_pattern = "^(break|new|fix|hotfix|feat|chore|docs)"
bump_map = { "break" = "MAJOR", "new" = "MINOR", 'feat' = "MINOR", "fix" = "PATCH", "hotfix" = "PATCH", 'chore' = "PATCH", 'docs' = "PATCH" }
change_type_order = [
    "BREAKING CHANGE",
    "feat",
    "fix",
    "refactor",
    "perf",
    'docs',
    'style',
    'test',
    'chore',
]
commit_parser = "^(?P<change_type>feat|fix|chore)(?:\\((?P<scope>[^)]+)\\))?:\\s(?P<message>.+)$"
changelog_pattern = "^(feat|fix|docs|chore)?(!)?"
change_type_map = { "feat" = "Feat", "fix" = "Fix", "chore" = "Misc", "docs" = "Docs" }

[[tool.commitizen.customize.questions]]
type = "list"
name = "change_type"
choices = [
    { value = "feature", name = "feature: A new feature." },
    { value = "bug fix", name = "bug fix: A bug fix." },
]
message = "Select the type of change you are committing"

[[tool.commitizen.customize.questions]]
type = "input"
name = "message"
message = "Body."

[[tool.commitizen.customize.questions]]
type = "confirm"
name = "show_message"
message = "Do you want to add body message in commit?"
