[build-system]
requires = ["setuptools", "wheel", "setuptools-git-versioning"]
build-backend = "setuptools.build_meta"

[project]
name = "MatDBForge"
dynamic = ["version"]
description = "An automatic workflow for generating data and training NNPs"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Pol Sanz", email = "psanz@iciq.es" },
    { name = "Zan Lian", email = "zlian@iciq.es" },
]

dependencies = [
    "ase",
    "dscribe==2.1.0",
    "gunicorn==22.0.0",
    "matplotlib==3.8.0",
    "mp_api",
    "pandas",
    "plotly==5.18.0",
    "rich==13.7.0",
    "scipy==1.11.2",
    "seaborn==0.13.2",
    "mace-torch @ git+https://github.com/ACEsuit/mace.git",
    "e3nn==0.4.4",
    "aiida-core==2.6.2",
    "aiida-lammps==1.0.1",
    "aiida-vasp==3.1.0",
    "torch",
    "wonderwords==2.2.0",
    "pymatgen",
    "python-slugify[unidecode]",
    "flask",
    "tomli >= 1.1.0 ; python_version < '3.11'"
]

[project.optional-dependencies]
dev = ["pre-commit", "pytest", "pytest-cov"]


[project.urls]
Homepage = "https://github.com/pol-sb/MatDBForge"

[project.entry-points."aiida.calculations"]
"mace-train" = "MatDBForge.active_learning.mace_tools_aiida:TrainMACEModelCalculation"
"mace-get-descriptors" = "MatDBForge.active_learning.mace_tools_aiida:GetMACEDescriptorsCalculation"
"mace-eval" = "MatDBForge.active_learning.mace_tools_aiida:EvaluateMACEConfigsCalculation"
"mace-lammps-gpu-md" = "MatDBForge.active_learning.mace_tools_aiida:RunMDCalculationGPULAMMPSMACE"
"mace-committee-eval" = "MatDBForge.active_learning.mace_tools_aiida:CheckMACECommitteeResultsCalculation"

[project.entry-points."aiida.calculations.monitors"]
"monitor.davwarning" = "MatDBForge.workflows.monitors:output_monitor"

[project.entry-points."aiida.workflows"]
"mdb-active-learning" = "MatDBForge.workflows.active_learning:ActiveLearningWorkChain"
"mdb-active-learning-base" = "MatDBForge.workflows.active_learning:ActiveLearningBaseWorkChain"

[project.entry-points."aiida.parsers"]
"mace-training-parser" = "MatDBForge.active_learning.mace_tools_aiida:TrainMACEModelCalculationParser"
"mace-descriptors-parser" = "MatDBForge.active_learning.mace_tools_aiida:GetMACEDescriptorsCalculationParser"
"mace-eval-parser" = "MatDBForge.active_learning.mace_tools_aiida:EvaluateMACEConfigsCalculationParser"
"mace-committee-eval-parser" = "MatDBForge.active_learning.mace_tools_aiida:CheckMACECommiteeResultsCalculationParser"
"mace-lammps-raw-parser" = "MatDBForge.active_learning.mace_tools_aiida:LAMMPSMACERawParser"

[project.scripts]
"mdb_active_learning" = "MatDBForge.core.command_line.cli_active_learning:run_active_learning"
"mdb_gen_configuration_file" = "MatDBForge.core.command_line.cli_generate_configuration_file:gen_default_config"
"mdb_monitor_al_loop" = "MatDBForge.core.command_line.cli_dashboard:monitor_al_loop"
"mdb_gen_init_db" = "MatDBForge.core.command_line.cli_generate_init_db:run_gen_initial_database"
"mdb_init_setup" = "MatDBForge.core.command_line.cli_run_initial_config:run_initial_config"

[tool.setuptools]
include-package-data = true
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools-git-versioning]
enabled = true
version_file = "VERSION"
count_commits_from_version_file = true
dev_template = "{tag}.post{ccount}"
dirty_template = "{tag}.post{ccount}+git-{branch}-{sha}"


[tool.commitizen]
name = "cz_conventional_commits"
version = "0.8.0"
changelog_incremental = true
update_changelog_on_bump = true
version_files = [
    "src/__version__.py",
    "pyproject.toml:version",
    "VERSION"
]
